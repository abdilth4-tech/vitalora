<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vitalora — Lupa Password</title>
  <link rel="stylesheet" href="../shared/neumorphic.css">
  <script type='module' src='https://unpkg.com/ionicons@5.0.0/dist/ionicons/ionicons.esm.js'></script>
  <script nomodule src='https://unpkg.com/ionicons@5.0.0/dist/ionicons/ionicons.js'></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: 'Poppins', sans-serif; background: var(--bg); overflow-x: hidden; display: flex; flex-direction: column; min-height: 100vh; }

    /* BG */
    .auth-bg {
      position: fixed; inset: 0; z-index: 0;
      background: linear-gradient(160deg,#040E07 0%,#071A0F 40%,#0D2B1A 70%,#1A5C38 100%);
    }
    .auth-bg::before {
      content:''; position:absolute; inset:0;
      background-image:radial-gradient(circle,rgba(255,255,255,0.025) 1px,transparent 1px);
      background-size:28px 28px;
    }
    .auth-bg::after {
      content:''; position:absolute; bottom:-100px; left:50%; transform:translateX(-50%);
      width:600px; height:600px; border-radius:50%;
      background:radial-gradient(circle, rgba(111,207,151,0.07) 0%, transparent 70%);
    }

    /* MAIN */
    .auth-page { position:relative; z-index:1; flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 20px; }

    /* BACK LINK */
    .back-link { position:fixed; top:20px; left:20px; z-index:10; display:flex; align-items:center; gap:6px; color:rgba(255,255,255,0.5); font-size:0.82rem; font-weight:500; text-decoration:none; transition:color 0.2s; }
    .back-link:hover { color:#6FCF97; }

    /* CARD */
    .auth-card {
      background: rgba(228,235,245,0.97);
      border-radius: 28px;
      padding: 44px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.05);
      animation: cardIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
      text-align: center;
    }
    @keyframes cardIn { from { opacity:0; transform:translateY(30px) scale(0.96); } to { opacity:1; transform:none; } }
    @media (max-width: 480px) { .auth-card { padding: 32px 24px; border-radius: 24px; } }

    /* LOCK ICON */
    .icon-wrap {
      width:88px; height:88px; border-radius:28px;
      background:var(--bg); box-shadow:var(--shadow-out);
      display:flex; align-items:center; justify-content:center;
      margin:0 auto 24px;
      position: relative;
    }
    .icon-wrap ion-icon { font-size:2.6rem; color:var(--primary-dark); }
    .icon-wrap::after {
      content:''; position:absolute; inset:-4px; border-radius:32px;
      border:2px dashed rgba(39,174,96,0.25);
    }

    /* TITLE */
    .auth-title { font-size:1.4rem; font-weight:800; color:var(--text-primary); margin-bottom:8px; letter-spacing:-0.3px; }
    .auth-sub { font-size:0.85rem; color:var(--text-secondary); margin-bottom:28px; line-height:1.6; }

    /* FORM */
    .form-group { margin-bottom:16px; text-align:left; }
    .form-label { display:block; font-size:0.77rem; font-weight:600; color:var(--text-secondary); margin-bottom:7px; letter-spacing:0.02em; }
    .input-wrap { position:relative; }
    .input-wrap ion-icon.input-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--text-secondary); font-size:1rem; pointer-events:none; }
    .neu-input { width:100%; background:var(--bg); border:none; border-radius:12px; padding:12px 14px 12px 40px; font-size:0.875rem; color:var(--text-primary); box-shadow:var(--shadow-in); font-family:'Poppins',sans-serif; outline:none; transition:box-shadow 0.2s; }
    .neu-input:focus { box-shadow:var(--shadow-in), 0 0 0 2px rgba(39,174,96,0.25); }
    .neu-input::placeholder { color:var(--text-secondary); opacity:0.6; }
    .neu-input:disabled { opacity:0.6; cursor:not-allowed; }

    /* SUBMIT BTN */
    .btn-send { width:100%; padding:14px; border-radius:14px; background:linear-gradient(135deg,#27AE60,#6FCF97); color:#fff; font-size:0.95rem; font-weight:700; border:none; cursor:pointer; font-family:'Poppins',sans-serif; box-shadow:0 6px 24px rgba(111,207,151,0.4); transition:transform 0.2s,box-shadow 0.2s; display:flex; align-items:center; justify-content:center; gap:8px; letter-spacing:0.02em; margin-top:4px; }
    .btn-send:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 10px 32px rgba(111,207,151,0.5); }
    .btn-send:active { transform:translateY(0); }
    .btn-send:disabled { opacity:0.7; cursor:not-allowed; transform:none; }

    /* ERROR BOX */
    #auth-error { display:none; background:rgba(235,87,87,0.08); border:1px solid rgba(235,87,87,0.25); border-radius:10px; padding:10px 14px; margin-bottom:16px; font-size:0.8rem; color:#C0392B; font-weight:500; line-height:1.5; text-align:left; }
    #auth-error.show { display:flex; align-items:flex-start; gap:8px; }
    #auth-error ion-icon { font-size:1rem; flex-shrink:0; margin-top:1px; color:#EB5757; }

    /* METHOD PILLS */
    .method-tabs { display:flex; gap:8px; margin-bottom:20px; }
    .method-tab { flex:1; padding:9px 8px; border-radius:10px; font-size:0.78rem; font-weight:700; border:none; cursor:pointer; font-family:'Poppins',sans-serif; display:flex; align-items:center; justify-content:center; gap:5px; transition:all 0.2s; background:var(--bg); box-shadow:var(--shadow-out-sm); color:var(--text-secondary); }
    .method-tab.active { background:linear-gradient(135deg,rgba(39,174,96,0.12),rgba(111,207,151,0.08)); box-shadow:var(--shadow-in-sm); color:var(--primary-dark); font-weight:700; }

    /* FOOTER */
    .auth-footer { text-align:center; margin-top:20px; }
    .auth-footer a { font-size:0.82rem; color:var(--primary-dark); font-weight:700; text-decoration:none; display:inline-flex; align-items:center; gap:4px; }
    .auth-footer a:hover { text-decoration:underline; }

    /* INFO BOX */
    .info-box { background:rgba(47,128,237,0.06); border-radius:12px; padding:12px 14px; display:flex; align-items:flex-start; gap:10px; margin-bottom:18px; text-align:left; }
    .info-box ion-icon { color:#2F80ED; font-size:1rem; flex-shrink:0; margin-top:2px; }
    .info-box p { font-size:0.77rem; color:var(--text-secondary); line-height:1.5; }

    /* SUCCESS STATE */
    .success-box { display:none; background:rgba(39,174,96,0.08); border:1px solid rgba(39,174,96,0.25); border-radius:12px; padding:14px 16px; margin-bottom:16px; text-align:left; }
    .success-box.show { display:flex; align-items:flex-start; gap:10px; }
    .success-box ion-icon { color:#27AE60; font-size:1.2rem; flex-shrink:0; margin-top:2px; }
    .success-box p { font-size:0.82rem; color:#1a6b3a; line-height:1.5; font-weight:500; }

    /* ECG decoration */
    .ecg-deco { position:fixed; bottom:30px; left:0; right:0; height:40px; opacity:0.15; pointer-events:none; overflow:hidden; }
    .ecg-deco svg { width:200%; animation:ecgScroll 14s linear infinite; }
    @keyframes ecgScroll { from{transform:translateX(0)} to{transform:translateX(-50%)} }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>

<!-- BG -->
<div class="auth-bg"></div>

<!-- ECG decoration -->
<div class="ecg-deco">
  <svg viewBox="0 0 1440 40" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <polyline points="0,20 80,20 100,20 110,5 120,35 130,5 140,20 160,20 240,20 260,20 270,8 280,32 290,8 300,20 320,20 400,20 420,20 430,5 440,35 450,5 460,20 480,20 560,20 580,20 590,8 600,32 610,8 620,20 640,20 720,20 740,20 750,5 760,35 770,5 780,20 800,20 880,20 900,20 910,8 920,32 930,8 940,20 960,20 1040,20 1060,20 1070,5 1080,35 1090,5 1100,20 1120,20 1200,20 1220,20 1230,8 1240,32 1250,8 1260,20 1280,20 1360,20 1380,20 1390,5 1400,35 1410,5 1420,20 1440,20" fill="none" stroke="#6FCF97" stroke-width="1.5"/>
    <polyline points="1440,20 1520,20 1540,20 1550,5 1560,35 1570,5 1580,20 1600,20 1680,20 1700,20 1710,8 1720,32 1730,8 1740,20 1760,20 1840,20 1860,20 1870,5 1880,35 1890,5 1900,20 1920,20 2000,20 2020,20 2030,8 2040,32 2050,8 2060,20 2080,20 2160,20 2180,20 2190,5 2200,35 2210,5 2220,20 2240,20 2320,20 2340,20 2350,8 2360,32 2370,8 2380,20 2400,20 2440,20 2460,20 2470,5 2480,35 2490,5 2500,20 2520,20 2600,20 2620,20 2630,8 2640,32 2650,8 2660,20 2680,20 2760,20 2780,20 2790,5 2800,35 2810,5 2820,20 2840,20 2880,20" fill="none" stroke="#6FCF97" stroke-width="1.5"/>
  </svg>
</div>

<!-- BACK LINK -->
<a href="login.html" class="back-link">
  <ion-icon name="arrow-back-outline"></ion-icon> Kembali ke Masuk
</a>

<!-- AUTH PAGE -->
<main class="auth-page">
  <div class="auth-card">

    <!-- LOCK ICON -->
    <div class="icon-wrap" data-animate="scale" data-delay="0">
      <ion-icon name="lock-closed-outline"></ion-icon>
    </div>

    <!-- TITLE -->
    <div data-animate="up" data-delay="80">
      <div class="auth-title">Lupa Password?</div>
      <div class="auth-sub">Masukkan email terdaftar Anda dan kami akan mengirimkan link reset password.</div>
    </div>

    <!-- ERROR BOX -->
    <div id="auth-error">
      <ion-icon name="alert-circle-outline"></ion-icon>
      <span id="auth-error-text"></span>
    </div>

    <!-- SUCCESS BOX -->
    <div class="success-box" id="success-box">
      <ion-icon name="checkmark-circle-outline"></ion-icon>
      <p id="success-text">Email reset password telah dikirim. Cek inbox Anda.</p>
    </div>

    <!-- FORM -->
    <div class="form-group" data-animate="up" data-delay="180">
      <label class="form-label" id="inputLabel">Alamat Email</label>
      <div class="input-wrap">
        <ion-icon name="mail-outline" class="input-icon" id="inputIcon"></ion-icon>
        <input type="email" class="neu-input" id="contactInput" placeholder="email@contoh.com" autocomplete="email">
      </div>
    </div>

    <!-- INFO BOX -->
    <div class="info-box" data-animate="up" data-delay="220">
      <ion-icon name="information-circle-outline"></ion-icon>
      <p>Link reset password akan dikirim ke email Anda. Berlaku selama <strong>1 jam</strong>.</p>
    </div>

    <!-- SUBMIT -->
    <button class="btn-send" id="sendBtn" onclick="doSend()" data-animate="up" data-delay="260">
      <ion-icon name="send-outline"></ion-icon>
      <span id="sendBtnText">Kirim Link Reset</span>
    </button>

    <!-- FOOTER -->
    <div class="auth-footer" data-animate="up" data-delay="300">
      <a href="login.html">
        <ion-icon name="arrow-back-outline"></ion-icon>
        Kembali ke halaman masuk
      </a>
    </div>

  </div>
</main>

<script src="../shared/app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="../shared/firebase.js"></script>
<script>
  function showToastMsg(msg, type) {
    if (typeof showToast === 'function') showToast(msg, type || 'info');
    else alert(msg);
  }

  function showError(msg) {
    const box  = document.getElementById('auth-error');
    const text = document.getElementById('auth-error-text');
    text.textContent = msg;
    box.classList.add('show');
    document.getElementById('success-box').classList.remove('show');
  }

  function hideError() {
    document.getElementById('auth-error').classList.remove('show');
  }

  function showSuccess(msg) {
    const box  = document.getElementById('success-box');
    const text = document.getElementById('success-text');
    text.textContent = msg;
    box.classList.add('show');
    hideError();
  }

  async function doSend() {
    const email = document.getElementById('contactInput').value.trim();
    hideError();

    if (!email) {
      showError('Masukkan alamat email Anda.');
      return;
    }

    const btn     = document.getElementById('sendBtn');
    const btnText = document.getElementById('sendBtnText');
    btn.disabled  = true;
    btn.innerHTML = '<ion-icon name="reload-outline" style="animation:spin 0.8s linear infinite"></ion-icon><span>Mengirim...</span>';
    document.getElementById('contactInput').disabled = true;

    try {
      await VAuth.resetPassword(email);
      showSuccess('Email reset password telah dikirim. Cek inbox Anda.');
      showToastMsg('Email reset password telah dikirim.', 'success');
      btn.innerHTML = '<ion-icon name="checkmark-outline"></ion-icon><span>Email Terkirim</span>';
      // Keep button disabled so user doesn't spam
    } catch (err) {
      document.getElementById('contactInput').disabled = false;
      btn.innerHTML = '<ion-icon name="send-outline"></ion-icon><span id="sendBtnText">Kirim Link Reset</span>';
      btn.disabled  = false;
      if (err.code === 'auth/user-not-found') {
        showError('Email tidak terdaftar. Periksa kembali email Anda.');
      } else if (err.code === 'auth/invalid-email') {
        showError('Format email tidak valid.');
      } else if (err.code === 'auth/too-many-requests') {
        showError('Terlalu banyak permintaan. Tunggu beberapa menit.');
      } else {
        showError('Terjadi kesalahan. Silakan coba lagi.');
      }
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') doSend(); });
</script>
</body>
</html>
