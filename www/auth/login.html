<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vitalora — Masuk</title>
  <link rel="stylesheet" href="../shared/neumorphic.css">
  <script type='module' src='https://unpkg.com/ionicons@5.0.0/dist/ionicons/ionicons.esm.js'></script>
  <script nomodule src='https://unpkg.com/ionicons@5.0.0/dist/ionicons/ionicons.js'></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: 'Poppins', sans-serif; background: var(--bg); overflow-x: hidden; display: flex; flex-direction: column; min-height: 100vh; }

    /* BG */
    .auth-bg {
      position: fixed; inset: 0; z-index: 0;
      background: linear-gradient(160deg,#040E07 0%,#071A0F 40%,#0D2B1A 70%,#1A5C38 100%);
    }
    .auth-bg::before {
      content:''; position:absolute; inset:0;
      background-image:radial-gradient(circle,rgba(255,255,255,0.025) 1px,transparent 1px);
      background-size:28px 28px;
    }
    .auth-bg::after {
      content:''; position:absolute; bottom:-100px; left:50%; transform:translateX(-50%);
      width:600px; height:600px; border-radius:50%;
      background:radial-gradient(circle, rgba(111,207,151,0.07) 0%, transparent 70%);
    }

    /* MAIN */
    .auth-page { position:relative; z-index:1; flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 20px; }

    /* BACK LINK */
    .back-link { position:fixed; top:20px; left:20px; z-index:10; display:flex; align-items:center; gap:6px; color:rgba(255,255,255,0.5); font-size:0.82rem; font-weight:500; text-decoration:none; transition:color 0.2s; }
    .back-link:hover { color:#6FCF97; }

    /* CARD */
    .auth-card {
      background: rgba(228,235,245,0.97);
      border-radius: 28px;
      padding: 44px 40px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.05);
      animation: cardIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes cardIn { from { opacity:0; transform:translateY(30px) scale(0.96); } to { opacity:1; transform:none; } }
    @media (max-width: 480px) { .auth-card { padding: 32px 24px; border-radius: 24px; } }

    /* LOGO */
    .auth-logo { text-align:center; margin-bottom:28px; }
    .logo-mark { width:60px; height:60px; border-radius:18px; background:linear-gradient(135deg,#0D2B1A,#27AE60); display:flex; align-items:center; justify-content:center; margin:0 auto 12px; box-shadow:0 8px 24px rgba(39,174,96,0.35); }
    .logo-mark ion-icon { font-size:2rem; color:#fff; }
    .auth-logo .brand { font-size:1.4rem; font-weight:800; color:var(--text-primary); letter-spacing:-0.5px; }
    .auth-logo .brand span { color:var(--primary-dark); }
    .auth-logo p { font-size:0.82rem; color:var(--text-secondary); margin-top:3px; }

    /* ROLE SELECTOR */
    .role-label { font-size:0.75rem; font-weight:700; color:var(--text-secondary); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:10px; }
    .role-cards { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:24px; }
    .role-card { background:var(--bg); border-radius:14px; box-shadow:var(--shadow-out); padding:14px 8px; display:flex; flex-direction:column; align-items:center; gap:6px; cursor:pointer; border:2px solid transparent; transition:all 0.2s; user-select:none; }
    .role-card:hover { transform:translateY(-2px); }
    .role-card.selected { border-color:var(--primary-dark); box-shadow:var(--shadow-out), 0 0 0 0px transparent; background:linear-gradient(135deg, rgba(39,174,96,0.06), rgba(111,207,151,0.04)); }
    .role-card.selected .rc-icon { background:linear-gradient(135deg,#0D2B1A,#27AE60); color:#fff; }
    .rc-icon { width:40px; height:40px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:1.1rem; background:rgba(39,174,96,0.1); color:var(--primary-dark); transition:all 0.2s; }
    .rc-icon.blue { background:rgba(29,93,181,0.1); color:#1D5DB5; }
    .rc-icon.purple { background:rgba(74,67,204,0.1); color:#4A43CC; }
    .role-card.selected .rc-icon.blue { background:linear-gradient(135deg,#0C2352,#1D5DB5); color:#fff; }
    .role-card.selected .rc-icon.purple { background:linear-gradient(135deg,#1E1350,#4A43CC); color:#fff; }
    .rc-label { font-size:0.75rem; font-weight:700; color:var(--text-primary); }
    .rc-sub { font-size:0.65rem; color:var(--text-secondary); }

    /* DIVIDER */
    .divider-label { display:flex; align-items:center; gap:12px; margin-bottom:18px; }
    .divider-label::before, .divider-label::after { content:''; flex:1; height:1px; background:rgba(0,0,0,0.08); }
    .divider-label span { font-size:0.75rem; color:var(--text-secondary); white-space:nowrap; }

    /* INPUTS */
    .form-group { margin-bottom:16px; }
    .form-label { display:block; font-size:0.77rem; font-weight:600; color:var(--text-secondary); margin-bottom:7px; letter-spacing:0.02em; }
    .input-wrap { position:relative; }
    .input-wrap ion-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--text-secondary); font-size:1rem; pointer-events:none; }
    .neu-input { width:100%; background:var(--bg); border:none; border-radius:12px; padding:12px 14px 12px 40px; font-size:0.875rem; color:var(--text-primary); box-shadow:var(--shadow-in); font-family:'Poppins',sans-serif; outline:none; transition:box-shadow 0.2s; }
    .neu-input:focus { box-shadow:var(--shadow-in), 0 0 0 2px rgba(39,174,96,0.25); }
    .neu-input::placeholder { color:var(--text-secondary); opacity:0.6; }
    .pw-toggle { position:absolute; right:14px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:var(--text-secondary); font-size:1rem; padding:4px; }

    /* FORGOT */
    .forgot-row { display:flex; justify-content:flex-end; margin-bottom:20px; margin-top:-8px; }
    .forgot-link { font-size:0.77rem; color:var(--primary-dark); font-weight:600; text-decoration:none; }
    .forgot-link:hover { text-decoration:underline; }

    /* SUBMIT BTN */
    .btn-login { width:100%; padding:14px; border-radius:14px; background:linear-gradient(135deg,#27AE60,#6FCF97); color:#fff; font-size:0.95rem; font-weight:700; border:none; cursor:pointer; font-family:'Poppins',sans-serif; box-shadow:0 6px 24px rgba(111,207,151,0.4); transition:transform 0.2s,box-shadow 0.2s; display:flex; align-items:center; justify-content:center; gap:8px; letter-spacing:0.02em; }
    .btn-login:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 10px 32px rgba(111,207,151,0.5); }
    .btn-login:active { transform:translateY(0); }
    .btn-login:disabled { opacity:0.7; cursor:not-allowed; transform:none; }
    .btn-login.role-doctor { background:linear-gradient(135deg,#1D5DB5,#56CCF2); box-shadow:0 6px 24px rgba(86,204,242,0.35); }
    .btn-login.role-doctor:hover:not(:disabled) { box-shadow:0 10px 32px rgba(86,204,242,0.45); }
    .btn-login.role-admin { background:linear-gradient(135deg,#4A43CC,#9B59B6); box-shadow:0 6px 24px rgba(155,89,182,0.35); }
    .btn-login.role-admin:hover:not(:disabled) { box-shadow:0 10px 32px rgba(155,89,182,0.45); }

    /* SOCIAL LOGIN */
    .social-login { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px; }
    .btn-social { display:flex; align-items:center; justify-content:center; gap:8px; padding:10px 14px; border-radius:12px; background:var(--bg); box-shadow:var(--shadow-out); font-size:0.8rem; font-weight:600; color:var(--text-primary); border:none; cursor:pointer; font-family:'Poppins',sans-serif; transition:transform 0.2s; }
    .btn-social:hover:not(:disabled) { transform:translateY(-2px); }
    .btn-social:disabled { opacity:0.7; cursor:not-allowed; }
    .social-logo { width:18px; height:18px; border-radius:4px; object-fit:contain; font-size:1rem; }

    /* ERROR BOX */
    #auth-error { display:none; background:rgba(235,87,87,0.08); border:1px solid rgba(235,87,87,0.25); border-radius:10px; padding:10px 14px; margin-bottom:16px; font-size:0.8rem; color:#C0392B; font-weight:500; line-height:1.5; }
    #auth-error.show { display:flex; align-items:flex-start; gap:8px; }
    #auth-error ion-icon { font-size:1rem; flex-shrink:0; margin-top:1px; color:#EB5757; }

    /* REGISTER LINK */
    .register-row { text-align:center; margin-top:20px; }
    .register-row p { font-size:0.82rem; color:var(--text-secondary); }
    .register-row a { color:var(--primary-dark); font-weight:700; text-decoration:none; }
    .register-row a:hover { text-decoration:underline; }

    /* DEBUG BYPASS */
    .debug-panel { margin-top:20px; padding:14px 16px; border:2px dashed rgba(245,158,11,0.5); border-radius:14px; background:rgba(245,158,11,0.05); }
    .debug-panel-title { font-size:0.7rem; font-weight:700; color:#B45309; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:10px; display:flex; align-items:center; gap:6px; }
    .debug-btns { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
    .btn-bypass { padding:8px 6px; border-radius:10px; font-size:0.72rem; font-weight:700; border:none; cursor:pointer; font-family:'Poppins',sans-serif; transition:transform 0.15s,opacity 0.15s; display:flex; flex-direction:column; align-items:center; gap:3px; }
    .btn-bypass:hover { transform:translateY(-2px); opacity:0.9; }
    .btn-bypass:active { transform:scale(0.95); }
    .btn-bypass.p { background:linear-gradient(135deg,#0D2B1A,#27AE60); color:#fff; }
    .btn-bypass.d { background:linear-gradient(135deg,#0C2352,#1D5DB5); color:#fff; }
    .btn-bypass.a { background:linear-gradient(135deg,#1E1350,#4A43CC); color:#fff; }
    .btn-bypass span { font-size:0.65rem; opacity:0.85; }

    /* ECG decoration */
    .ecg-deco { position:fixed; bottom:30px; left:0; right:0; height:40px; opacity:0.15; pointer-events:none; overflow:hidden; }
    .ecg-deco svg { width:200%; animation:ecgScroll 14s linear infinite; }
    @keyframes ecgScroll { from{transform:translateX(0)} to{transform:translateX(-50%)} }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>

<!-- BG -->
<div class="auth-bg"></div>

<!-- ECG decoration -->
<div class="ecg-deco">
  <svg viewBox="0 0 1440 40" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <polyline points="0,20 80,20 100,20 110,5 120,35 130,5 140,20 160,20 240,20 260,20 270,8 280,32 290,8 300,20 320,20 400,20 420,20 430,5 440,35 450,5 460,20 480,20 560,20 580,20 590,8 600,32 610,8 620,20 640,20 720,20 740,20 750,5 760,35 770,5 780,20 800,20 880,20 900,20 910,8 920,32 930,8 940,20 960,20 1040,20 1060,20 1070,5 1080,35 1090,5 1100,20 1120,20 1200,20 1220,20 1230,8 1240,32 1250,8 1260,20 1280,20 1360,20 1380,20 1390,5 1400,35 1410,5 1420,20 1440,20" fill="none" stroke="#6FCF97" stroke-width="1.5"/>
    <polyline points="1440,20 1520,20 1540,20 1550,5 1560,35 1570,5 1580,20 1600,20 1680,20 1700,20 1710,8 1720,32 1730,8 1740,20 1760,20 1840,20 1860,20 1870,5 1880,35 1890,5 1900,20 1920,20 2000,20 2020,20 2030,8 2040,32 2050,8 2060,20 2080,20 2160,20 2180,20 2190,5 2200,35 2210,5 2220,20 2240,20 2320,20 2340,20 2350,8 2360,32 2370,8 2380,20 2400,20 2440,20 2460,20 2470,5 2480,35 2490,5 2500,20 2520,20 2600,20 2620,20 2630,8 2640,32 2650,8 2660,20 2680,20 2760,20 2780,20 2790,5 2800,35 2810,5 2820,20 2840,20 2880,20" fill="none" stroke="#6FCF97" stroke-width="1.5"/>
  </svg>
</div>

<!-- BACK LINK -->
<a href="../index.html" class="back-link">
  <ion-icon name="arrow-back-outline"></ion-icon> Kembali ke Beranda
</a>

<!-- AUTH PAGE -->
<main class="auth-page">
  <div class="auth-card">

    <!-- LOGO -->
    <div class="auth-logo">
      <div class="logo-mark"><ion-icon name="pulse-outline"></ion-icon></div>
      <div class="brand">Vital<span>ora</span></div>
      <p>Platform Telemedisin AIoT Indonesia</p>
    </div>

    <!-- ROLE SELECTOR -->
    <p class="role-label">Masuk sebagai</p>
    <div class="role-cards">
      <div class="role-card selected" id="role-pasien" onclick="selectRole('pasien')">
        <div class="rc-icon" id="icon-pasien"><ion-icon name="person-outline"></ion-icon></div>
        <div class="rc-label">Pasien</div>
        <div class="rc-sub">Patient Portal</div>
      </div>
      <div class="role-card" id="role-dokter" onclick="selectRole('dokter')">
        <div class="rc-icon blue" id="icon-dokter"><ion-icon name="medkit-outline"></ion-icon></div>
        <div class="rc-label">Dokter</div>
        <div class="rc-sub">Doctor Portal</div>
      </div>
      <div class="role-card" id="role-admin" onclick="selectRole('admin')">
        <div class="rc-icon purple" id="icon-admin"><ion-icon name="settings-outline"></ion-icon></div>
        <div class="rc-label">Admin</div>
        <div class="rc-sub">Admin Panel</div>
      </div>
    </div>

    <!-- SOCIAL LOGIN -->
    <div class="social-login">
      <button class="btn-social" id="googleBtn" onclick="doGoogleLogin()">
        <span style="font-size:1.1rem;font-weight:900;color:#EA4335;">G</span> Google
      </button>
      <button class="btn-social" onclick="showToastMsg('Apple login belum tersedia')">
        <ion-icon name="logo-apple"></ion-icon> Apple
      </button>
    </div>

    <div class="divider-label"><span>atau masuk dengan email</span></div>

    <!-- ERROR BOX -->
    <div id="auth-error">
      <ion-icon name="alert-circle-outline"></ion-icon>
      <span id="auth-error-text"></span>
    </div>

    <!-- FORM -->
    <div class="form-group">
      <label class="form-label">Email</label>
      <div class="input-wrap">
        <ion-icon name="mail-outline"></ion-icon>
        <input type="email" class="neu-input" id="emailInput" placeholder="email@contoh.com" autocomplete="email">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="input-wrap">
        <ion-icon name="lock-closed-outline"></ion-icon>
        <input type="password" class="neu-input" id="pwInput" placeholder="Masukkan password" autocomplete="current-password">
        <button class="pw-toggle" onclick="togglePw()" id="pwToggleBtn" type="button">
          <ion-icon name="eye-outline" id="pwIcon"></ion-icon>
        </button>
      </div>
    </div>

    <div class="forgot-row">
      <a href="forgot-password.html" class="forgot-link">Lupa password?</a>
    </div>

    <button class="btn-login" id="loginBtn" onclick="doLogin()">
      <ion-icon name="log-in-outline"></ion-icon>
      <span id="loginBtnText">Masuk sebagai Pasien</span>
    </button>

    <div class="register-row">
      <p>Belum punya akun? <a href="register.html">Daftar sekarang</a></p>
    </div>

    <!-- DEBUG BYPASS PANEL -->
    <div class="debug-panel">
      <div class="debug-panel-title">
        <ion-icon name="bug-outline"></ion-icon> Debug Mode — Bypass Login
      </div>
      <div class="debug-btns">
        <button class="btn-bypass p" onclick="bypassAs('patient','../patient/home.html')">
          <ion-icon name="person-outline"></ion-icon>
          Pasien
          <span>Patient Portal</span>
        </button>
        <button class="btn-bypass d" onclick="bypassAs('doctor','../doctor/home.html')">
          <ion-icon name="medkit-outline"></ion-icon>
          Dokter
          <span>Doctor Portal</span>
        </button>
        <button class="btn-bypass a" onclick="bypassAs('admin','../admin/home.html')">
          <ion-icon name="settings-outline"></ion-icon>
          Admin
          <span>Admin Panel</span>
        </button>
      </div>
      <div style="margin-top:12px;padding-top:12px;border-top:1px dashed rgba(245,158,11,0.3);">
        <button class="btn-bypass" style="width:100%;background:#EB5757;color:#fff;" onclick="resetMyAccount()">
          <ion-icon name="trash-outline"></ion-icon>
          Reset Akun Saya
          <span>Hapus data untuk test ulang role selection</span>
        </button>
      </div>
    </div>

  </div>
</main>

<script src="../shared/app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="../shared/firebase.js"></script>
<script>
  let selectedRole = 'pasien';

  const roleConfig = {
    pasien:  { label:'Pasien',  btnClass:'',            btnText:'Masuk sebagai Pasien' },
    dokter:  { label:'Dokter',  btnClass:'role-doctor', btnText:'Masuk sebagai Dokter' },
    admin:   { label:'Admin',   btnClass:'role-admin',  btnText:'Masuk sebagai Admin'  },
  };

  function selectRole(role) {
    selectedRole = role;
    document.querySelectorAll('.role-card').forEach(c => c.classList.remove('selected'));
    document.getElementById('role-' + role).classList.add('selected');

    const btn = document.getElementById('loginBtn');
    btn.className = 'btn-login ' + (roleConfig[role].btnClass || '');
    document.getElementById('loginBtnText').textContent = roleConfig[role].btnText;
  }

  function togglePw() {
    const input = document.getElementById('pwInput');
    const icon  = document.getElementById('pwIcon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.setAttribute('name','eye-off-outline');
    } else {
      input.type = 'password';
      icon.setAttribute('name','eye-outline');
    }
  }

  function showToastMsg(msg, type) {
    if (typeof showToast === 'function') showToast(msg, type || 'info');
    else alert(msg);
  }

  function showError(msg) {
    const box  = document.getElementById('auth-error');
    const text = document.getElementById('auth-error-text');
    text.textContent = msg;
    box.classList.add('show');
  }

  function hideError() {
    document.getElementById('auth-error').classList.remove('show');
  }

  function setLoading(loading) {
    const btn = document.getElementById('loginBtn');
    const googleBtn = document.getElementById('googleBtn');
    if (loading) {
      btn.innerHTML = '<ion-icon name="reload-outline" style="animation:spin 0.8s linear infinite"></ion-icon><span>Memuat...</span>';
      btn.disabled = true;
      googleBtn.disabled = true;
    } else {
      const cfg = roleConfig[selectedRole];
      btn.innerHTML = '<ion-icon name="log-in-outline"></ion-icon><span id="loginBtnText">' + cfg.btnText + '</span>';
      btn.className = 'btn-login ' + (cfg.btnClass || '');
      btn.disabled = false;
      googleBtn.disabled = false;
    }
  }

  function getErrorMessage(code) {
    const map = {
      'auth/wrong-password':       'Email atau password salah.',
      'auth/user-not-found':       'Akun tidak ditemukan.',
      'auth/email-not-verified':   null, // handled as toast
      'auth/invalid-email':        'Format email tidak valid.',
      'auth/too-many-requests':    'Terlalu banyak percobaan. Coba lagi nanti.',
      'auth/user-disabled':        'Akun Anda telah dinonaktifkan.',
      'auth/invalid-credential':   'Email atau password salah.',
    };
    return map[code] || 'Terjadi kesalahan. Silakan coba lagi.';
  }

  async function doLogin() {
    const email = document.getElementById('emailInput').value.trim();
    const pw    = document.getElementById('pwInput').value;
    hideError();

    if (!email) { showError('Masukkan email Anda.'); return; }
    if (!pw)    { showError('Masukkan password Anda.'); return; }

    setLoading(true);
    try {
      const { user, role } = await VAuth.login(email, pw);
      showToastMsg('Selamat datang kembali!', 'success');
      VAuth.redirectByRole(role, 1);
    } catch (err) {
      setLoading(false);
      if (err.code === 'auth/email-not-verified') {
        showToastMsg('Silakan verifikasi email Anda dulu. Cek inbox dan klik link verifikasi.', 'warning');
      } else {
        showError(getErrorMessage(err.code));
      }
    }
  }

  async function doGoogleLogin() {
    hideError();
    const googleBtn = document.getElementById('googleBtn');
    const loginBtn  = document.getElementById('loginBtn');
    googleBtn.disabled = true;
    loginBtn.disabled  = true;
    googleBtn.innerHTML = '<ion-icon name="reload-outline" style="animation:spin 0.8s linear infinite"></ion-icon> Memuat...';

    try {
      const result = await VAuth.loginGoogle('patient');

      // New user - redirect to role selection
      if (result.isNewUser) {
        showToastMsg('Akun baru! Pilih role Anda...', 'info');
        setTimeout(() => {
          window.location.href = 'select-role.html';
        }, 1000);
        return;
      }

      // Check role status
      if (result.roleStatus === 'pending') {
        showToastMsg('Menunggu persetujuan admin...', 'warning');
        setTimeout(() => {
          window.location.href = 'pending-approval.html';
        }, 1000);
        return;
      }

      if (result.roleStatus === 'rejected') {
        showToastMsg('Permintaan role ditolak.', 'error');
        setTimeout(() => {
          window.location.href = 'role-rejected.html';
        }, 1000);
        return;
      }

      // Approved - redirect to appropriate portal
      showToastMsg('Login Google berhasil!', 'success');
      VAuth.redirectByRole(result.role, 1);

    } catch (err) {
      googleBtn.innerHTML = '<span style="font-size:1.1rem;font-weight:900;color:#EA4335;">G</span> Google';
      googleBtn.disabled = false;
      loginBtn.disabled  = false;
      if (err.code !== 'auth/popup-closed-by-user') {
        showError(getErrorMessage(err.code));
      }
    }
  }

  // Allow Enter key to submit
  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  // Debug bypass — set flag then navigate (clears real auth)
  function bypassAs(role, url) {
    localStorage.setItem('vitalora_debug_role', role);
    window.location.href = url;
  }

  // Reset current user account for testing role selection
  async function resetMyAccount() {
    if (!confirm('Ini akan login dengan Google, hapus data akun dari Firestore, lalu redirect ke halaman pilih role. Lanjutkan?')) {
      return;
    }

    try {
      // Login with Google first to get the user
      const provider = new firebase.auth.GoogleAuthProvider();
      const cred = await VFirebase.auth.signInWithPopup(provider);
      const user = cred.user;

      showToastMsg('Menghapus data akun...', 'info');

      // Delete user document from Firestore
      await VFirebase.db.collection('users').doc(user.uid).delete();
      // Also delete patient profile if exists
      await VFirebase.db.collection('patients').doc(user.uid).delete().catch(() => {});

      showToastMsg('Akun direset! Redirecting...', 'success');

      // Redirect to select-role page
      setTimeout(() => {
        window.location.href = 'select-role.html';
      }, 1000);

    } catch (err) {
      if (err.code !== 'auth/popup-closed-by-user') {
        console.error(err);
        showToastMsg('Gagal reset: ' + err.message, 'error');
      }
    }
  }
</script>
</body>
</html>
