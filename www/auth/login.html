<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vitalora — Masuk</title>
  <link rel="stylesheet" href="../shared/neumorphic.css">
  <script type='module' src='https://unpkg.com/ionicons@5.0.0/dist/ionicons/ionicons.esm.js'></script>
  <script nomodule src='https://unpkg.com/ionicons@5.0.0/dist/ionicons/ionicons.js'></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: 'Poppins', sans-serif; background: var(--bg); overflow-x: hidden; display: flex; flex-direction: column; min-height: 100vh; }

    /* BG - MESH GRADIENT */
    .auth-bg {
      position: fixed; inset: 0; z-index: 0;
      background-color: #040E07;
      background-image: 
        radial-gradient(at 0% 0%, rgba(39,174,96,0.15) 0px, transparent 50%),
        radial-gradient(at 100% 0%, rgba(46,204,113,0.1) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(13,43,26,0.2) 0px, transparent 50%),
        radial-gradient(at 0% 100%, rgba(30,81,54,0.3) 0px, transparent 50%),
        radial-gradient(at 50% 50%, rgba(4,14,7,1) 0px, transparent 80%);
      overflow: hidden;
    }
    .auth-bg::before {
      content:''; position:absolute; inset:0;
      background-image:radial-gradient(circle,rgba(255,255,255,0.03) 1px,transparent 1px);
      background-size:32px 32px;
      opacity: 0.4;
    }
    /* Floating blobs for extra depth */
    .auth-bg::after {
      content:''; position:absolute; top:20%; left:30%;
      width:400px; height:400px; border-radius:50%;
      background: radial-gradient(circle, rgba(111,207,151,0.05) 0%, transparent 70%);
      filter: blur(60px);
      animation: float 20s infinite alternate;
    }
    @keyframes float { from { transform: translate(0,0); } to { transform: translate(100px, 50px); } }

    /* MAIN */
    .auth-page { position:relative; z-index:1; flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 20px; }

    /* GLASSMORPHISM CARD */
    .auth-card {
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-radius: 32px;
      padding: 48px 40px;
      width: 100%;
      max-width: 440px;
      border: 1px solid rgba(255, 255, 255, 0.125);
      box-shadow: 0 32px 64px rgba(0,0,0,0.5);
      animation: cardIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    @keyframes cardIn { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:none; } }
    @media (max-width: 480px) { .auth-card { padding: 32px 24px; border-radius: 24px; } }

    /* LOGO & TEXT COLOR ADJUSTMENTS FOR GLASS */
    .auth-logo .brand { font-size:1.6rem; font-weight:800; color:#fff; letter-spacing:-0.5px; }
    .auth-logo .brand span { color:#6FCF97; }
    .auth-logo p { font-size:0.85rem; color:rgba(255,255,255,0.6); margin-top:4px; }
    .divider-label span { font-size:0.75rem; color:rgba(255,255,255,0.5); white-space:nowrap; }
    .form-label { color:rgba(255,255,255,0.7); }
    .register-row p { color:rgba(255,255,255,0.5); }
    .forgot-link { color:#6FCF97; }

    /* NEU-INPUT ADAPTATION FOR GLASS */
    .neu-input { 
      background: rgba(255,255,255,0.05); 
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: none;
      color: #fff;
    }
    .neu-input:focus { 
      background: rgba(255,255,255,0.1);
      box-shadow: 0 0 0 2px rgba(111,207,151,0.3);
      border-color: rgba(111,207,151,0.5);
    }
    .btn-social {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      box-shadow: none;
    }
    .btn-social:hover { background: rgba(255,255,255,0.1); }

    /* ERROR BOX */
    #auth-error { display:none; background:rgba(235,87,87,0.08); border:1px solid rgba(235,87,87,0.25); border-radius:10px; padding:10px 14px; margin-bottom:16px; font-size:0.8rem; color:#C0392B; font-weight:500; line-height:1.5; }
    #auth-error.show { display:flex; align-items:flex-start; gap:8px; }
    #auth-error ion-icon { font-size:1rem; flex-shrink:0; margin-top:1px; color:#EB5757; }

    /* REGISTER LINK */
    .register-row { text-align:center; margin-top:20px; }
    .register-row p { font-size:0.82rem; color:var(--text-secondary); }
    .register-row a { color:var(--primary-dark); font-weight:700; text-decoration:none; }
    .register-row a:hover { text-decoration:underline; }

    /* ECG decoration */
    .ecg-deco { position:fixed; bottom:30px; left:0; right:0; height:40px; opacity:0.15; pointer-events:none; overflow:hidden; }
    .ecg-deco svg { width:200%; animation:ecgScroll 14s linear infinite; }
    @keyframes ecgScroll { from{transform:translateX(0)} to{transform:translateX(-50%)} }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>

<!-- BG -->
<div class="auth-bg"></div>

<!-- ECG decoration -->
<div class="ecg-deco">
  <svg viewBox="0 0 1440 40" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <polyline points="0,20 80,20 100,20 110,5 120,35 130,5 140,20 160,20 240,20 260,20 270,8 280,32 290,8 300,20 320,20 400,20 420,20 430,5 440,35 450,5 460,20 480,20 560,20 580,20 590,8 600,32 610,8 620,20 640,20 720,20 740,20 750,5 760,35 770,5 780,20 800,20 880,20 900,20 910,8 920,32 930,8 940,20 960,20 1040,20 1060,20 1070,5 1080,35 1090,5 1100,20 1120,20 1200,20 1220,20 1230,8 1240,32 1250,8 1260,20 1280,20 1360,20 1380,20 1390,5 1400,35 1410,5 1420,20 1440,20" fill="none" stroke="#6FCF97" stroke-width="1.5"/>
    <polyline points="1440,20 1520,20 1540,20 1550,5 1560,35 1570,5 1580,20 1600,20 1680,20 1700,20 1710,8 1720,32 1730,8 1740,20 1760,20 1840,20 1860,20 1870,5 1880,35 1890,5 1900,20 1920,20 2000,20 2020,20 2030,8 2040,32 2050,8 2060,20 2080,20 2160,20 2180,20 2190,5 2200,35 2210,5 2220,20 2240,20 2320,20 2340,20 2350,8 2360,32 2370,8 2380,20 2400,20 2440,20 2460,20 2470,5 2480,35 2490,5 2500,20 2520,20 2600,20 2620,20 2630,8 2640,32 2650,8 2660,20 2680,20 2760,20 2780,20 2790,5 2800,35 2810,5 2820,20 2840,20 2880,20" fill="none" stroke="#6FCF97" stroke-width="1.5"/>
  </svg>
</div>

<!-- BACK LINK -->
<a href="../index.html" class="back-link">
  <ion-icon name="arrow-back-outline"></ion-icon> Kembali ke Beranda
</a>

<!-- AUTH PAGE -->
<main class="auth-page">
  <div class="auth-card">

    <!-- LOGO -->
    <div class="auth-logo">
      <div class="logo-mark"><ion-icon name="pulse-outline"></ion-icon></div>
      <div class="brand">Vital<span>ora</span></div>
      <p>Platform Telemedisin AIoT Indonesia</p>
    </div>

    <!-- SOCIAL LOGIN -->
    <div class="social-login">
      <button class="btn-social" id="googleBtn" onclick="doGoogleLogin()">
        <span style="font-size:1.1rem;font-weight:900;color:#EA4335;">G</span> Google
      </button>
    </div>

    <div class="divider-label"><span>atau masuk dengan email</span></div>

    <!-- ERROR BOX -->
    <div id="auth-error">
      <ion-icon name="alert-circle-outline"></ion-icon>
      <span id="auth-error-text"></span>
    </div>

    <!-- FORM -->
    <div class="form-group">
      <label class="form-label">Email</label>
      <div class="input-wrap">
        <ion-icon name="mail-outline"></ion-icon>
        <input type="email" class="neu-input" id="emailInput" placeholder="email@contoh.com" autocomplete="email">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="input-wrap">
        <ion-icon name="lock-closed-outline"></ion-icon>
        <input type="password" class="neu-input" id="pwInput" placeholder="Masukkan password" autocomplete="current-password">
        <button class="pw-toggle" onclick="togglePw()" id="pwToggleBtn" type="button">
          <ion-icon name="eye-outline" id="pwIcon"></ion-icon>
        </button>
      </div>
    </div>

    <div class="forgot-row">
      <a href="forgot-password.html" class="forgot-link">Lupa password?</a>
    </div>

    <button class="btn-login" id="loginBtn" onclick="doLogin()">
      <ion-icon name="log-in-outline"></ion-icon>
      <span id="loginBtnText">Masuk</span>
    </button>

    <div class="register-row">
      <p>Belum punya akun? <a href="register.html">Daftar sekarang</a></p>
    </div>

  </div>
</main>

<script src="../shared/app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="../shared/firebase.js"></script>
<script>
  function togglePw() {
    const input = document.getElementById('pwInput');
    const icon  = document.getElementById('pwIcon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.setAttribute('name','eye-off-outline');
    } else {
      input.type = 'password';
      icon.setAttribute('name','eye-outline');
    }
  }

  function showToastMsg(msg, type) {
    if (typeof showToast === 'function') showToast(msg, type || 'info');
    else alert(msg);
  }

  function showError(msg) {
    const box  = document.getElementById('auth-error');
    const text = document.getElementById('auth-error-text');
    text.textContent = msg;
    box.classList.add('show');
  }

  function hideError() {
    document.getElementById('auth-error').classList.remove('show');
  }

  function setLoading(loading) {
    const btn = document.getElementById('loginBtn');
    const googleBtn = document.getElementById('googleBtn');
    if (loading) {
      btn.innerHTML = '<ion-icon name="reload-outline" style="animation:spin 0.8s linear infinite"></ion-icon><span>Memuat...</span>';
      btn.disabled = true;
      googleBtn.disabled = true;
    } else {
      btn.innerHTML = '<ion-icon name="log-in-outline"></ion-icon><span id="loginBtnText">Masuk</span>';
      btn.disabled = false;
      googleBtn.disabled = false;
    }
  }

  function getErrorMessage(code) {
    const map = {
      'auth/wrong-password':       'Email atau password salah.',
      'auth/user-not-found':       'Akun tidak ditemukan.',
      'auth/email-not-verified':   null, // handled as toast
      'auth/invalid-email':        'Format email tidak valid.',
      'auth/too-many-requests':    'Terlalu banyak percobaan. Coba lagi nanti.',
      'auth/user-disabled':        'Akun Anda telah dinonaktifkan.',
      'auth/invalid-credential':   'Email atau password salah.',
    };
    return map[code] || 'Terjadi kesalahan. Silakan coba lagi.';
  }

  async function doLogin() {
    const email = document.getElementById('emailInput').value.trim();
    const pw    = document.getElementById('pwInput').value;
    hideError();

    if (!email) { showError('Masukkan email Anda.'); return; }
    if (!pw)    { showError('Masukkan password Anda.'); return; }

    setLoading(true);
    try {
      const { user, role } = await VAuth.login(email, pw);
      showToastMsg('Selamat datang kembali!', 'success');
      VAuth.redirectByRole(role, 1);
    } catch (err) {
      setLoading(false);
      if (err.code === 'auth/email-not-verified') {
        showToastMsg('Silakan verifikasi email Anda dulu. Cek inbox dan klik link verifikasi.', 'warning');
      } else {
        showError(getErrorMessage(err.code));
      }
    }
  }

  async function doGoogleLogin() {
    hideError();
    const googleBtn = document.getElementById('googleBtn');
    const loginBtn  = document.getElementById('loginBtn');
    googleBtn.disabled = true;
    loginBtn.disabled  = true;
    googleBtn.innerHTML = '<ion-icon name="reload-outline" style="animation:spin 0.8s linear infinite"></ion-icon> Memuat...';

    try {
      const result = await VAuth.loginGoogle('patient');

      // New user - redirect to role selection
      if (result.isNewUser) {
        showToastMsg('Akun baru! Pilih role Anda...', 'info');
        setTimeout(() => {
          window.location.href = 'select-role.html';
        }, 1000);
        return;
      }

      // Check role status
      if (result.roleStatus === 'pending') {
        showToastMsg('Menunggu persetujuan admin...', 'warning');
        setTimeout(() => {
          window.location.href = 'pending-approval.html';
        }, 1000);
        return;
      }

      if (result.roleStatus === 'rejected') {
        showToastMsg('Permintaan role ditolak.', 'error');
        setTimeout(() => {
          window.location.href = 'role-rejected.html';
        }, 1000);
        return;
      }

      // Approved - redirect to appropriate portal
      showToastMsg('Login Google berhasil!', 'success');
      VAuth.redirectByRole(result.role, 1);

    } catch (err) {
      googleBtn.innerHTML = '<span style="font-size:1.1rem;font-weight:900;color:#EA4335;">G</span> Google';
      googleBtn.disabled = false;
      loginBtn.disabled  = false;
      if (err.code !== 'auth/popup-closed-by-user') {
        showError(getErrorMessage(err.code));
      }
    }
  }

  // Allow Enter key to submit
  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
