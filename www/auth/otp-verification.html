<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vitalora — Verifikasi OTP</title>
  <link rel="stylesheet" href="../shared/neumorphic.css">
  <script type='module' src='https://unpkg.com/ionicons@5.0.0/dist/ionicons/ionicons.esm.js'></script>
  <script nomodule src='https://unpkg.com/ionicons@5.0.0/dist/ionicons/ionicons.js'></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: 'Poppins', sans-serif; background: var(--bg); overflow-x: hidden; display: flex; flex-direction: column; min-height: 100vh; }

    /* BG */
    .auth-bg {
      position: fixed; inset: 0; z-index: 0;
      background: linear-gradient(160deg,#040E07 0%,#071A0F 40%,#0D2B1A 70%,#1A5C38 100%);
    }
    .auth-bg::before {
      content:''; position:absolute; inset:0;
      background-image:radial-gradient(circle,rgba(255,255,255,0.025) 1px,transparent 1px);
      background-size:28px 28px;
    }
    .auth-bg::after {
      content:''; position:absolute; bottom:-100px; left:50%; transform:translateX(-50%);
      width:600px; height:600px; border-radius:50%;
      background:radial-gradient(circle, rgba(111,207,151,0.07) 0%, transparent 70%);
    }

    /* MAIN */
    .auth-page { position:relative; z-index:1; flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 20px; }

    /* BACK LINK */
    .back-link { position:fixed; top:20px; left:20px; z-index:10; display:flex; align-items:center; gap:6px; color:rgba(255,255,255,0.5); font-size:0.82rem; font-weight:500; text-decoration:none; transition:color 0.2s; }
    .back-link:hover { color:#6FCF97; }

    /* CARD */
    .auth-card {
      background: rgba(228,235,245,0.97);
      border-radius: 28px;
      padding: 44px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.05);
      animation: cardIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
      text-align: center;
    }
    @keyframes cardIn { from { opacity:0; transform:translateY(30px) scale(0.96); } to { opacity:1; transform:none; } }
    @media (max-width: 480px) { .auth-card { padding: 32px 24px; border-radius: 24px; } }

    /* MAIL ICON */
    .icon-wrap {
      width:88px; height:88px; border-radius:28px;
      background:var(--bg); box-shadow:var(--shadow-out);
      display:flex; align-items:center; justify-content:center;
      margin:0 auto 24px;
      position: relative;
    }
    .icon-wrap ion-icon { font-size:2.6rem; color:var(--primary-dark); }
    .icon-wrap .pulse-ring {
      position:absolute; inset:-8px; border-radius:36px;
      border:2px solid rgba(111,207,151,0.35);
      animation:pulseRing 2s ease-out infinite;
    }
    .icon-wrap .pulse-ring-2 {
      position:absolute; inset:-16px; border-radius:40px;
      border:2px solid rgba(111,207,151,0.15);
      animation:pulseRing 2s ease-out infinite 0.5s;
    }
    @keyframes pulseRing { 0%{opacity:1;transform:scale(1)} 100%{opacity:0;transform:scale(1.2)} }

    /* TITLE */
    .auth-title { font-size:1.4rem; font-weight:800; color:var(--text-primary); margin-bottom:6px; letter-spacing:-0.3px; }
    .auth-sub { font-size:0.84rem; color:var(--text-secondary); margin-bottom:6px; line-height:1.6; }
    .auth-phone { font-size:0.9rem; font-weight:700; color:var(--primary-dark); margin-bottom:28px; }

    /* OTP INPUT BOXES */
    .otp-row {
      display:flex; justify-content:center; gap:10px;
      margin-bottom:24px;
    }
    .otp-box {
      width:52px; height:60px;
      background:var(--bg);
      border:2px solid transparent;
      border-radius:14px;
      box-shadow:inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
      font-size:1.5rem; font-weight:800;
      color:var(--text-primary);
      text-align:center;
      font-family:'Poppins',sans-serif;
      outline:none;
      transition:all 0.2s;
      caret-color: var(--primary-dark);
    }
    .otp-box:focus {
      border-color:var(--primary-dark);
      box-shadow:inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light), 0 0 0 3px rgba(39,174,96,0.18);
    }
    .otp-box.filled {
      border-color:rgba(39,174,96,0.4);
      box-shadow:inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
    }
    .otp-box.error {
      border-color:var(--danger);
      box-shadow:inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light), 0 0 0 3px rgba(235,87,87,0.18);
      animation:shake 0.4s ease;
    }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
    @media (max-width: 380px) {
      .otp-box { width:44px; height:54px; font-size:1.3rem; gap:6px; }
      .otp-row { gap:7px; }
    }

    /* COUNTDOWN */
    .countdown-row { font-size:0.82rem; color:var(--text-secondary); margin-bottom:20px; }
    .countdown-row .time { font-weight:700; color:var(--primary-dark); }
    .countdown-row .time.expired { color:var(--danger); }

    /* RESEND LINK */
    .resend-btn {
      display:none;
      background:none; border:none; cursor:pointer;
      font-family:'Poppins',sans-serif; font-size:0.82rem;
      font-weight:700; color:var(--primary-dark); text-decoration:underline;
      margin-top:4px;
      transition:color 0.2s;
    }
    .resend-btn:hover { color:var(--primary-darker); }
    .resend-btn.visible { display:inline-block; }

    /* SUBMIT BTN */
    .btn-verify { width:100%; padding:14px; border-radius:14px; background:linear-gradient(135deg,#27AE60,#6FCF97); color:#fff; font-size:0.95rem; font-weight:700; border:none; cursor:pointer; font-family:'Poppins',sans-serif; box-shadow:0 6px 24px rgba(111,207,151,0.4); transition:transform 0.2s,box-shadow 0.2s; display:flex; align-items:center; justify-content:center; gap:8px; letter-spacing:0.02em; }
    .btn-verify:hover { transform:translateY(-2px); box-shadow:0 10px 32px rgba(111,207,151,0.5); }
    .btn-verify:active { transform:translateY(0); }
    .btn-verify:disabled { opacity:0.55; cursor:not-allowed; transform:none; }

    /* FOOTER */
    .auth-footer { text-align:center; margin-top:20px; }
    .auth-footer a { font-size:0.82rem; color:var(--primary-dark); font-weight:700; text-decoration:none; display:inline-flex; align-items:center; gap:4px; }
    .auth-footer a:hover { text-decoration:underline; }

    /* PROGRESS DOTS */
    .otp-progress { display:flex; justify-content:center; gap:6px; margin-bottom:18px; }
    .otp-dot { width:8px; height:8px; border-radius:50%; background:var(--bg); box-shadow:var(--shadow-out-sm); transition:all 0.25s; }
    .otp-dot.active { background:var(--primary-dark); box-shadow:0 2px 8px rgba(39,174,96,0.4); transform:scale(1.2); }

    /* ECG decoration */
    .ecg-deco { position:fixed; bottom:30px; left:0; right:0; height:40px; opacity:0.15; pointer-events:none; overflow:hidden; }
    .ecg-deco svg { width:200%; animation:ecgScroll 14s linear infinite; }
    @keyframes ecgScroll { from{transform:translateX(0)} to{transform:translateX(-50%)} }
  </style>
</head>
<body>

<!-- BG -->
<div class="auth-bg"></div>

<!-- ECG decoration -->
<div class="ecg-deco">
  <svg viewBox="0 0 1440 40" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <polyline points="0,20 80,20 100,20 110,5 120,35 130,5 140,20 160,20 240,20 260,20 270,8 280,32 290,8 300,20 320,20 400,20 420,20 430,5 440,35 450,5 460,20 480,20 560,20 580,20 590,8 600,32 610,8 620,20 640,20 720,20 740,20 750,5 760,35 770,5 780,20 800,20 880,20 900,20 910,8 920,32 930,8 940,20 960,20 1040,20 1060,20 1070,5 1080,35 1090,5 1100,20 1120,20 1200,20 1220,20 1230,8 1240,32 1250,8 1260,20 1280,20 1360,20 1380,20 1390,5 1400,35 1410,5 1420,20 1440,20" fill="none" stroke="#6FCF97" stroke-width="1.5"/>
    <polyline points="1440,20 1520,20 1540,20 1550,5 1560,35 1570,5 1580,20 1600,20 1680,20 1700,20 1710,8 1720,32 1730,8 1740,20 1760,20 1840,20 1860,20 1870,5 1880,35 1890,5 1900,20 1920,20 2000,20 2020,20 2030,8 2040,32 2050,8 2060,20 2080,20 2160,20 2180,20 2190,5 2200,35 2210,5 2220,20 2240,20 2320,20 2340,20 2350,8 2360,32 2370,8 2380,20 2400,20 2440,20 2460,20 2470,5 2480,35 2490,5 2500,20 2520,20 2600,20 2620,20 2630,8 2640,32 2650,8 2660,20 2680,20 2760,20 2780,20 2790,5 2800,35 2810,5 2820,20 2840,20 2880,20" fill="none" stroke="#6FCF97" stroke-width="1.5"/>
  </svg>
</div>

<!-- BACK LINK -->
<a href="forgot-password.html" class="back-link">
  <ion-icon name="arrow-back-outline"></ion-icon> Kembali
</a>

<!-- AUTH PAGE -->
<main class="auth-page">
  <div class="auth-card">

    <!-- MAIL ICON -->
    <div class="icon-wrap" data-animate="scale" data-delay="0">
      <div class="pulse-ring"></div>
      <div class="pulse-ring-2"></div>
      <ion-icon name="mail-outline"></ion-icon>
    </div>

    <!-- TITLE -->
    <div data-animate="up" data-delay="80">
      <div class="auth-title">Verifikasi OTP</div>
      <div class="auth-sub">Kode dikirim ke</div>
      <div class="auth-phone">0812****3456</div>
    </div>

    <!-- OTP PROGRESS -->
    <div class="otp-progress" id="otpProgress" data-animate="up" data-delay="130">
      <div class="otp-dot" id="dot-0"></div>
      <div class="otp-dot" id="dot-1"></div>
      <div class="otp-dot" id="dot-2"></div>
      <div class="otp-dot" id="dot-3"></div>
      <div class="otp-dot" id="dot-4"></div>
      <div class="otp-dot" id="dot-5"></div>
    </div>

    <!-- OTP BOXES -->
    <div class="otp-row" id="otpRow" data-animate="up" data-delay="170">
      <input class="otp-box" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" id="otp0" autocomplete="one-time-code">
      <input class="otp-box" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" id="otp1">
      <input class="otp-box" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" id="otp2">
      <input class="otp-box" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" id="otp3">
      <input class="otp-box" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" id="otp4">
      <input class="otp-box" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" id="otp5">
    </div>

    <!-- COUNTDOWN -->
    <div class="countdown-row" data-animate="up" data-delay="210">
      Kirim ulang dalam <span class="time" id="countdownDisplay">00:59</span>
    </div>
    <button class="resend-btn" id="resendBtn" onclick="doResend()">Kirim Ulang</button>

    <!-- VERIFY BTN -->
    <button class="btn-verify" id="verifyBtn" onclick="doVerify()" data-animate="up" data-delay="250">
      <ion-icon name="shield-checkmark-outline"></ion-icon>
      <span>Verifikasi</span>
    </button>

    <!-- FOOTER -->
    <div class="auth-footer" data-animate="up" data-delay="290">
      <a href="login.html">
        <ion-icon name="arrow-back-outline"></ion-icon>
        Kembali ke halaman masuk
      </a>
    </div>

  </div>
</main>

<script src="../shared/app.js"></script>
<script>
  /* ── OTP INPUTS ── */
  const OTP_LEN = 6;
  const otpInputs = Array.from({ length: OTP_LEN }, (_, i) => document.getElementById('otp' + i));

  otpInputs.forEach((input, idx) => {
    input.addEventListener('input', (e) => {
      // Strip non-digits
      input.value = input.value.replace(/\D/g, '').slice(0, 1);

      updateDots();

      if (input.value) {
        input.classList.add('filled');
        input.classList.remove('error');
        // Advance to next
        if (idx < OTP_LEN - 1) otpInputs[idx + 1].focus();
        // Auto-verify when all filled
        if (getOtpValue().length === OTP_LEN) {
          setTimeout(doVerify, 300);
        }
      } else {
        input.classList.remove('filled');
      }
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace') {
        if (!input.value && idx > 0) {
          otpInputs[idx - 1].value = '';
          otpInputs[idx - 1].classList.remove('filled');
          otpInputs[idx - 1].focus();
          updateDots();
        }
      }
      // Allow only digits, backspace, delete, arrows, tab
      if (!/[0-9]/.test(e.key) && !['Backspace','Delete','ArrowLeft','ArrowRight','Tab'].includes(e.key)) {
        e.preventDefault();
      }
    });

    // Handle paste on first box
    input.addEventListener('paste', (e) => {
      e.preventDefault();
      const text = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '');
      text.split('').slice(0, OTP_LEN).forEach((char, i) => {
        if (otpInputs[i]) {
          otpInputs[i].value = char;
          otpInputs[i].classList.add('filled');
        }
      });
      const nextEmpty = otpInputs.findIndex(i => !i.value);
      if (nextEmpty !== -1) otpInputs[nextEmpty].focus();
      else otpInputs[OTP_LEN - 1].focus();
      updateDots();
      if (getOtpValue().length === OTP_LEN) setTimeout(doVerify, 300);
    });
  });

  function getOtpValue() {
    return otpInputs.map(i => i.value).join('');
  }

  function updateDots() {
    const filled = otpInputs.filter(i => i.value).length;
    for (let i = 0; i < OTP_LEN; i++) {
      document.getElementById('dot-' + i).classList.toggle('active', i < filled);
    }
  }

  function clearOtpError() {
    otpInputs.forEach(i => i.classList.remove('error'));
  }

  /* ── COUNTDOWN TIMER ── */
  let timerSeconds = 59;
  let timerInterval = null;

  function startTimer(seconds) {
    timerSeconds = seconds;
    clearInterval(timerInterval);

    const display   = document.getElementById('countdownDisplay');
    const resendBtn = document.getElementById('resendBtn');
    const countRow  = display.closest('.countdown-row');

    display.classList.remove('expired');
    resendBtn.classList.remove('visible');

    timerInterval = setInterval(() => {
      timerSeconds--;
      const m = String(Math.floor(timerSeconds / 60)).padStart(2, '0');
      const s = String(timerSeconds % 60).padStart(2, '0');
      display.textContent = `${m}:${s}`;

      if (timerSeconds <= 0) {
        clearInterval(timerInterval);
        display.textContent  = '00:00';
        display.classList.add('expired');
        countRow.childNodes[0].textContent = 'Kode kedaluwarsa. ';
        resendBtn.classList.add('visible');
      }
    }, 1000);
  }

  function doResend() {
    clearOtpError();
    otpInputs.forEach(i => { i.value = ''; i.classList.remove('filled', 'error'); });
    updateDots();
    otpInputs[0].focus();
    startTimer(59);
    const countRow = document.querySelector('.countdown-row');
    countRow.childNodes[0].textContent = 'Kirim ulang dalam ';
    showToastMsg('Kode OTP baru telah dikirim', 'success');
  }

  /* ── VERIFY ── */
  function doVerify() {
    const otp = getOtpValue();
    if (otp.length < OTP_LEN) {
      otpInputs.forEach((input, i) => {
        if (!input.value) input.classList.add('error');
      });
      showToastMsg('Masukkan semua 6 digit kode OTP', 'error');
      return;
    }

    const btn = document.getElementById('verifyBtn');
    btn.innerHTML = '<ion-icon name="reload-outline" style="animation:spin 0.8s linear infinite"></ion-icon><span>Memverifikasi...</span>';
    btn.disabled = true;

    setTimeout(() => {
      // Demo: any 6-digit code passes
      clearInterval(timerInterval);
      nav('../patient/home.html');
    }, 1000);
  }

  function showToastMsg(msg, type) {
    if (typeof showToast === 'function') showToast(msg, type || 'info');
    else alert(msg);
  }

  /* ── INIT ── */
  document.addEventListener('DOMContentLoaded', () => {
    otpInputs[0].focus();
    startTimer(59);
  });

  const style = document.createElement('style');
  style.textContent = '@keyframes spin { to { transform:rotate(360deg); } }';
  document.head.appendChild(style);
</script>
</body>
</html>
