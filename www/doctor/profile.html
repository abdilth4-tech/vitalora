<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="../favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vitalora — Dokter — Profil</title>
  <link rel="stylesheet" href="../shared/neumorphic.css">
  <script type='module' src='https://unpkg.com/ionicons@5.0.0/dist/ionicons/ionicons.esm.js'></script>
  <script nomodule src='https://unpkg.com/ionicons@5.0.0/dist/ionicons/ionicons.js'></script>
  <style>
    .app-header { background: linear-gradient(135deg, #0C2352 0%, #1D5DB5 100%); box-shadow: 0 2px 16px rgba(0,0,0,0.25); }
    .app-header .logo { color: #fff; }
    .app-header .logo span { color: #56CCF2; }
    .app-header .neu-icon-btn { background: rgba(255,255,255,0.12); box-shadow: none; color: #fff; border: 1px solid rgba(255,255,255,0.1); }
    .app-header .neu-icon-btn:active { background: rgba(255,255,255,0.2); }
    .app-header > div[style*="font-weight:700"] { color: #fff; }
    .section-header .section-title { border-left: 3px solid var(--info); padding-left: 10px; }
    .nav-item.active { color: var(--info); font-weight: 700; position: relative; }
    .nav-item.active::after { content: ''; position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%); width: 5px; height: 5px; border-radius: 50%; background: var(--info); }
    .nav-item.active ion-icon { color: var(--info); filter: drop-shadow(0 0 4px rgba(47,128,237,0.5)); }
  </style>
</head>
<body>

<div class="mobile-frame page-enter">
  <header class="app-header">
    <button class="neu-icon-btn" onclick="nav('home.html')"><ion-icon name="arrow-back-outline"></ion-icon></button>
    <div style="font-size:1.05rem;font-weight:700;">Profil Saya</div>
    <button class="neu-icon-btn" ><ion-icon name="settings-outline"></ion-icon></button>
  </header>

  <div class="section">
    <div class="neu-card" data-animate="up" style="text-align:center;">
      <div class="neu-avatar-xl" id="profile-avatar" style="margin:0 auto 12px;background:linear-gradient(135deg,#2F80ED,#56CCF2);">SW</div>
      <div style="font-size:1.1rem;font-weight:700;" id="profile-name">dr. Sarah Wijaya, Sp.PD</div>
      <div style="font-size:0.78rem;color:var(--text-tertiary);" id="profile-email">sarah.wijaya@vitalora.id</div>
      <div style="display:flex;justify-content:center;gap:6px;margin-top:8px;"><span class="neu-chip-primary" style="font-size:0.6rem;">STR Aktif</span><span class="neu-chip" style="font-size:0.6rem;">⭐ 4.9</span></div>
    </div>

    <div style="margin-top:24px;display:flex;flex-direction:column;gap:4px;">
      <div class="neu-list-item" data-animate="up" data-delay="100" onclick="nav('edit-profile.html')" style="cursor:pointer;">
        <div style="width:38px;height:38px;border-radius:10px;box-shadow:var(--shadow-out-sm);display:flex;align-items:center;justify-content:center;background:var(--primary-bg);"><ion-icon name="person-outline" style="color:var(--primary-dark);"></ion-icon></div>
        <div class="li-info"><div class="li-title">Edit Profil Profesional</div></div><ion-icon name="chevron-forward-outline" class="li-arrow"></ion-icon>
      </div>
      <div class="neu-list-item" data-animate="up" data-delay="150" onclick="nav('schedule.html')" style="cursor:pointer;">
        <div style="width:38px;height:38px;border-radius:10px;box-shadow:var(--shadow-out-sm);display:flex;align-items:center;justify-content:center;background:var(--info-bg);"><ion-icon name="calendar-outline" style="color:var(--info);"></ion-icon></div>
        <div class="li-info"><div class="li-title">Jadwal Praktik</div></div><ion-icon name="chevron-forward-outline" class="li-arrow"></ion-icon>
      </div>
      <div class="neu-list-item" data-animate="up" data-delay="200" onclick="nav('earnings.html')" style="cursor:pointer;">
        <div style="width:38px;height:38px;border-radius:10px;box-shadow:var(--shadow-out-sm);display:flex;align-items:center;justify-content:center;background:var(--success-bg);"><ion-icon name="cash-outline" style="color:var(--success);"></ion-icon></div>
        <div class="li-info"><div class="li-title">Pendapatan & Tarif</div></div><ion-icon name="chevron-forward-outline" class="li-arrow"></ion-icon>
      </div>
      <div class="neu-list-item" data-animate="up" data-delay="250" onclick="nav('reviews.html')" style="cursor:pointer;">
        <div style="width:38px;height:38px;border-radius:10px;box-shadow:var(--shadow-out-sm);display:flex;align-items:center;justify-content:center;background:var(--warning-bg);"><ion-icon name="star-outline" style="color:var(--warning);"></ion-icon></div>
        <div class="li-info"><div class="li-title">Ulasan Pasien</div></div><ion-icon name="chevron-forward-outline" class="li-arrow"></ion-icon>
      </div>
    </div>
    <button class="neu-btn neu-btn-block mt-24" style="color:var(--danger);" id="logout-btn"><ion-icon name="log-out-outline"></ion-icon> Keluar</button>
  </div>

  <nav class="bottom-nav">
    <a class="nav-item" href="home.html">
      <ion-icon name="home"></ion-icon><span>Beranda</span>
    </a>
    <a class="nav-item" href="patients.html">
      <ion-icon name="people-outline"></ion-icon><span>Pasien</span>
    </a>
    <a class="nav-item" href="chat.html">
      <ion-icon name="chatbubbles-outline"></ion-icon><span>Chat</span>
    </a>
    <a class="nav-item active" href="profile.html">
      <ion-icon name="person"></ion-icon><span>Profil</span>
    </a>
  </nav>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="../shared/firebase.js"></script>
<script src="../shared/app.js"></script>
<script>
function getInitials(name) {
  if (!name) return '??';
  return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
}

VAuth.guard('doctor', 1).then(({ user, profile }) => {
  // Replace name with real profile name
  if (profile && profile.name) {
    document.getElementById('profile-name').textContent = profile.name;
    document.getElementById('profile-avatar').textContent = getInitials(profile.name);
  }

  // Replace email with real user email
  if (user.email) {
    document.getElementById('profile-email').textContent = user.email;
  }

  // Logout button
  document.getElementById('logout-btn').addEventListener('click', () => {
    VAuth.logout();
  });
});
</script>

</body>
</html>
