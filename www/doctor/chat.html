<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vitalora — Dokter — Chat</title>
  <link rel="stylesheet" href="../shared/neumorphic.css">
  <script type='module' src='https://unpkg.com/ionicons@5.0.0/dist/ionicons/ionicons.esm.js'></script>
  <script nomodule src='https://unpkg.com/ionicons@5.0.0/dist/ionicons/ionicons.js'></script>
  <style>
    .app-header { background: linear-gradient(135deg, #0C2352 0%, #1D5DB5 100%); box-shadow: 0 2px 16px rgba(0,0,0,0.25); }
    .app-header .logo { color: #fff; }
    .app-header .logo span { color: #56CCF2; }
    .app-header .neu-icon-btn { background: rgba(255,255,255,0.12); box-shadow: none; color: #fff; border: 1px solid rgba(255,255,255,0.1); }
    .app-header .neu-icon-btn:active { background: rgba(255,255,255,0.2); }
    .app-header > div[style*="font-weight:700"] { color: #fff; }
    .section-header .section-title { border-left: 3px solid var(--info); padding-left: 10px; }
    .nav-item.active { color: var(--info); font-weight: 700; position: relative; }
    .nav-item.active::after { content: ''; position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%); width: 5px; height: 5px; border-radius: 50%; background: var(--info); }
    .nav-item.active ion-icon { color: var(--info); filter: drop-shadow(0 0 4px rgba(47,128,237,0.5)); }
  </style>
</head>
<body>

<div class="mobile-frame page-enter">
  <header class="app-header">
    <button class="neu-icon-btn" onclick="nav('home.html')"><ion-icon name="arrow-back-outline"></ion-icon></button>
    <div style="font-size:1.05rem;font-weight:700;">Chat & Orders</div>
    <button class="neu-icon-btn" ><ion-icon name="create-outline"></ion-icon></button>
  </header>

  <div class="section" style="padding-bottom:0">
    <div class="neu-tabs"><div class="neu-tab active">Antrian</div><div class="neu-tab">Aktif</div><div class="neu-tab">Resep</div></div>
  </div>

  <div class="section">
    <div style="display:flex;flex-direction:column;gap:12px;">
      <div class="neu-card" data-animate="up" data-delay="50" style="display:flex;gap:14px;align-items:center;cursor:pointer;border-left:4px solid var(--danger);">
        <div class="neu-avatar" style="background:linear-gradient(135deg,#EB5757,#FF7B7B)">AF</div>
        <div style="flex:1"><div style="font-weight:600;font-size:0.85rem;">Ahmad Fauzi</div><div style="font-size:0.7rem;color:var(--text-tertiary);">Pusing berulang, minta periksa...</div></div>
        <div style="text-align:right;"><span class="neu-chip-danger" style="font-size:0.6rem;">Urgent</span><div style="font-size:0.6rem;color:var(--text-muted);margin-top:4px;">2m lalu</div></div>
      </div>
      <div class="neu-card" data-animate="up" data-delay="100" style="display:flex;gap:14px;align-items:center;cursor:pointer;">
        <div class="neu-avatar" style="background:linear-gradient(135deg,#6C63FF,#8B83FF)">DS</div>
        <div style="flex:1"><div style="font-weight:600;font-size:0.85rem;">Dewi Sartika</div><div style="font-size:0.7rem;color:var(--text-tertiary);">Terima kasih dok, obatnya sudah...</div></div>
        <div style="text-align:right;"><div style="font-size:0.6rem;color:var(--text-muted);">15m lalu</div></div>
      </div>
      <div class="neu-card" data-animate="up" data-delay="150" style="display:flex;gap:14px;align-items:center;cursor:pointer;">
        <div class="neu-avatar" style="background:linear-gradient(135deg,#27AE60,#6FCF97)">BS</div>
        <div style="flex:1"><div style="font-weight:600;font-size:0.85rem;">Budi Santoso</div><div style="font-size:0.7rem;color:var(--text-tertiary);">Dok, hasil lab saya sudah keluar...</div></div>
        <div style="text-align:right;"><span class="neu-chip-info" style="font-size:0.6rem;background:var(--info-bg);color:var(--info);">New</span><div style="font-size:0.6rem;color:var(--text-muted);margin-top:4px;">1j lalu</div></div>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a class="nav-item" href="home.html">
      <ion-icon name="home"></ion-icon><span>Beranda</span>
    </a>
    <a class="nav-item" href="patients.html">
      <ion-icon name="people-outline"></ion-icon><span>Pasien</span>
    </a>
    <a class="nav-item active" href="chat.html">
      <ion-icon name="chatbubbles-outline"></ion-icon><span>Chat</span>
    </a>
    <a class="nav-item" href="profile.html">
      <ion-icon name="person-outline"></ion-icon><span>Profil</span>
    </a>
  </nav>
</div>
<script src="../shared/app.js"></script>

</body>
</html>
