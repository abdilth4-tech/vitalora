<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="../favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vitalora — Chat Dokter</title>
  <link rel="stylesheet" href="../shared/neumorphic.css">
  <script type='module' src='https://unpkg.com/ionicons@5.0.0/dist/ionicons/ionicons.esm.js'></script>
  <script nomodule src='https://unpkg.com/ionicons@5.0.0/dist/ionicons/ionicons.js'></script>
  <style>
    .app-header { background: linear-gradient(135deg, #0C2352 0%, #1D5DB5 100%); box-shadow: 0 2px 16px rgba(0,0,0,0.25); }
    .app-header .neu-icon-btn { background: rgba(255,255,255,0.12); box-shadow: none; color: #fff; border: 1px solid rgba(255,255,255,0.1); }
    .app-header .neu-icon-btn:active { background: rgba(255,255,255,0.2); }

    .mobile-frame { display: flex; flex-direction: column; overflow: hidden; }

    /* Header patient info */
    .chat-header-info { flex: 1; display: flex; flex-direction: column; gap: 1px; overflow: hidden; }
    .chat-header-name { font-size: 0.88rem; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-header-status { font-size: 0.65rem; color: rgba(255,255,255,0.75); }
    .status-dot { display: inline-block; width: 7px; height: 7px; background: #6FCF97; border-radius: 50%; margin-right: 4px; }

    /* Quick action bar */
    .quick-bar {
      background: var(--bg);
      padding: 10px 16px;
      display: flex; gap: 8px;
      overflow-x: auto;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      flex-shrink: 0;
    }
    .quick-bar::-webkit-scrollbar { display: none; }
    .quick-chip {
      flex-shrink: 0;
      padding: 7px 12px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
      background: var(--bg);
      border: none;
      cursor: pointer;
      box-shadow: var(--shadow-out-sm);
      color: var(--text-secondary);
      white-space: nowrap;
      transition: all 0.15s;
    }
    .quick-chip:active { box-shadow: var(--shadow-in-sm); }
    .quick-chip.blue { color: var(--info); }
    .quick-chip.green { color: var(--primary-dark); }
    .quick-chip.accent { color: var(--accent); }
    .quick-chip.orange { color: var(--warning); }

    /* Chat area */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-height: 0;
    }
    .chat-area::-webkit-scrollbar { width: 3px; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--shadow-dark); border-radius: 10px; }

    .chat-timestamp { text-align: center; font-size: 0.6rem; color: var(--text-muted); margin: 10px 0 6px; }

    .chat-bubble { max-width: 78%; padding: 10px 14px; border-radius: 18px; font-size: 0.78rem; line-height: 1.5; position: relative; }
    .chat-bubble.received { background: #fff; box-shadow: var(--shadow-out-sm); color: var(--text-secondary); border-bottom-left-radius: 4px; align-self: flex-start; }
    .chat-bubble.sent { background: linear-gradient(135deg, #1D5DB5, #2F80ED); color: #fff; border-bottom-right-radius: 4px; align-self: flex-end; box-shadow: 0 4px 12px rgba(47,128,237,0.35); }
    .bubble-time { font-size: 0.58rem; margin-top: 4px; opacity: 0.65; }
    .bubble-time.sent { text-align: right; }

    .chat-data-card {
      align-self: flex-start;
      background: var(--bg);
      border-radius: 16px;
      padding: 12px 14px;
      box-shadow: var(--shadow-out-sm);
      max-width: 82%;
      border-left: 3px solid var(--info);
      margin: 6px 0;
    }

    /* Vital sidebar */
    .vital-sidebar {
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: 200px;
      background: var(--bg);
      box-shadow: -4px 0 16px rgba(0,0,0,0.12);
      z-index: 10;
      padding: 16px 12px;
      overflow-y: auto;
      transition: transform 0.3s;
    }
    .vital-sidebar.hidden { transform: translateX(200px); }

    /* Input bar */
    .chat-input-bar {
      padding: 10px 14px;
      background: var(--bg);
      box-shadow: 0 -3px 12px rgba(0,0,0,0.07);
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
    }
    .chat-input-field {
      flex: 1;
      background: var(--bg);
      border: none;
      outline: none;
      padding: 10px 14px;
      border-radius: 22px;
      box-shadow: var(--shadow-in);
      font-family: 'Poppins', sans-serif;
      font-size: 0.78rem;
      color: var(--text-primary);
    }
    .send-btn {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1D5DB5, #2F80ED);
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #fff;
      font-size: 1.1rem;
      box-shadow: 0 3px 10px rgba(47,128,237,0.4);
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<div class="mobile-frame page-enter" style="position:relative;height:100%;max-height:100%;">
  <!-- Header -->
  <header class="app-header" style="display:flex;align-items:center;gap:10px;padding:10px 14px;">
    <button class="neu-icon-btn" onclick="nav('chat.html')"><ion-icon name="arrow-back-outline"></ion-icon></button>
    <div id="patientAvatar" style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#EB5757,#FF7B7B);display:flex;align-items:center;justify-content:center;font-size:0.9rem;font-weight:800;color:#fff;flex-shrink:0;">P</div>
    <div class="chat-header-info">
      <div class="chat-header-name" id="patientName">Memuat...</div>
      <div class="chat-header-status"><span class="status-dot"></span>Online</div>
    </div>
    <button class="neu-icon-btn" id="videoCallBtn"><ion-icon name="videocam-outline"></ion-icon></button>
    <button class="neu-icon-btn" onclick="nav('patient-detail.html')"><ion-icon name="information-circle-outline"></ion-icon></button>
  </header>

  <!-- Quick Action Bar -->
  <div class="quick-bar">
    <button class="quick-chip blue" onclick="nav('prescription.html')">📋 Resep</button>
    <button class="quick-chip green" onclick="nav('referral.html')">📄 Rujukan</button>
    <button class="quick-chip orange" onclick="toggleVitalSidebar()">📊 Vital</button>
    <button class="quick-chip accent" id="examinationBtn">🔬 Pemeriksaan</button>
  </div>

  <!-- Chat Area -->
  <div class="chat-area" id="chat-area">
    <div style="text-align:center;padding:40px 20px;color:var(--text-muted);font-size:0.8rem;">
      Memuat pesan...
    </div>
  </div>

  <!-- Vital Sidebar (hidden by default) -->
  <div class="vital-sidebar hidden" id="vital-sidebar">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <div style="font-size:0.75rem;font-weight:700;color:var(--text-primary);">Vital Real-time</div>
      <button class="neu-icon-btn" style="width:28px;height:28px;font-size:0.8rem;" onclick="toggleVitalSidebar()"><ion-icon name="close-outline"></ion-icon></button>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;">
      <div class="neu-card-sm" style="padding:10px;text-align:center;">
        <div style="font-size:0.6rem;color:var(--text-muted);">HR</div>
        <div style="font-size:1.2rem;font-weight:800;color:var(--danger);"><span id="sidebar-hr">--</span></div>
        <div style="font-size:0.58rem;color:var(--text-muted);">bpm</div>
      </div>
      <div class="neu-card-sm" style="padding:10px;text-align:center;">
        <div style="font-size:0.6rem;color:var(--text-muted);">SpO2</div>
        <div style="font-size:1.2rem;font-weight:800;color:var(--info);"><span id="sidebar-spo2">--</span></div>
        <div style="font-size:0.58rem;color:var(--text-muted);">%</div>
      </div>
      <div class="neu-card-sm" style="padding:10px;text-align:center;">
        <div style="font-size:0.6rem;color:var(--text-muted);">Suhu</div>
        <div style="font-size:1.2rem;font-weight:800;color:var(--warning);"><span id="sidebar-temp">--</span></div>
        <div style="font-size:0.58rem;color:var(--text-muted);">°C</div>
      </div>
      <div class="neu-card-sm" style="padding:10px;text-align:center;">
        <div style="font-size:0.6rem;color:var(--text-muted);">HRV</div>
        <div style="font-size:1.2rem;font-weight:800;color:var(--primary-dark);"><span id="sidebar-hrv">--</span></div>
        <div style="font-size:0.58rem;color:var(--text-muted);">ms</div>
      </div>
    </div>
    <div style="margin-top:12px;">
      <div id="sidebar-spark" style="height:50px;"></div>
    </div>
  </div>

  <!-- Input Bar -->
  <div class="chat-input-bar">
    <button class="neu-icon-btn" style="flex-shrink:0;" onclick="showToast('Lampirkan file','info')"><ion-icon name="attach-outline"></ion-icon></button>
    <input class="chat-input-field" id="msg-input" placeholder="Ketik pesan..." onkeydown="handleEnter(event)">
    <button class="send-btn" onclick="sendMessage()"><ion-icon name="send"></ion-icon></button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="../shared/firebase.js"></script>
<script src="../shared/app.js"></script>
<script src="../shared/chat-manager.js"></script>
<script src="../shared/webrtc-manager.js"></script>
<script>
  let chat = null;
  let patientId = null;
  const consultId = new URLSearchParams(location.search).get('consultId') || 'demo-consult-1';
  const chatAreaEl = document.getElementById('chat-area');

  function renderMessages(msgs) {
    if (msgs.length === 0) {
      chatAreaEl.innerHTML = '<div style="text-align:center;padding:40px 20px;color:var(--text-muted);font-size:0.8rem;">Belum ada pesan. Mulai percakapan!</div>';
      return;
    }
    const groups = VChatManager.groupByDate(msgs);
    let html = '';
    for (const [dateLabel, groupMsgs] of Object.entries(groups)) {
      html += `<div class="chat-timestamp">${dateLabel}</div>`;
      for (const msg of groupMsgs) {
        html += VChatManager.renderBubble(msg);
      }
    }
    chatAreaEl.innerHTML = html;
    chatAreaEl.scrollTop = chatAreaEl.scrollHeight;
  }

  function toggleVitalSidebar() {
    const sidebar = document.getElementById('vital-sidebar');
    sidebar.classList.toggle('hidden');
  }

  function handleEnter(e) {
    if (e.key === 'Enter') sendMessage();
  }

  async function sendMessage() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text || !chat) return;
    input.value = '';
    try {
      await chat.send(text);
    } catch (e) {
      showToast('Gagal mengirim pesan', 'error');
    }
  }

  document.addEventListener('DOMContentLoaded', async () => {
    const { user, profile } = await VAuth.guard('doctor', 1);

    // Setup video call button
    document.getElementById('videoCallBtn').addEventListener('click', () => {
      nav('../patient/video-call.html?consultId=' + consultId + '&isDoctor=true');
    });

    // Setup examination button
    document.getElementById('examinationBtn').addEventListener('click', () => {
      nav('guided-examination.html?consultId=' + consultId);
    });

    // Load consultation to get patient info
    try {
      const consult = await VDB.getConsultation(consultId);
      if (consult && consult.patientId) {
        patientId = consult.patientId;
        const patProfile = await VDB.getUser(patientId);
        if (patProfile) {
          document.getElementById('patientName').textContent = patProfile.name;
          const initials = patProfile.name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
          document.getElementById('patientAvatar').textContent = initials;
        }

        // Start vitals monitoring for the patient (simulated)
        VitalsManager.start(patientId);
        VitalsManager.subscribe(vitals => {
          document.getElementById('sidebar-hr').textContent = vitals.hr || '--';
          document.getElementById('sidebar-spo2').textContent = vitals.spo2 || '--';
          document.getElementById('sidebar-temp').textContent = vitals.temperature || '--';
          document.getElementById('sidebar-hrv').textContent = vitals.hrv || '--';
        });

        setTimeout(() => {
          sparkline(document.getElementById('sidebar-spark'), [80,82,85,80,88,84,82,86,82], '#EB5757', 50);
        }, 300);
      }
    } catch (e) {
      document.getElementById('patientName').textContent = 'Pasien';
    }

    // Init chat
    chat = new VChatManager(consultId, {
      uid: user.uid,
      name: profile.name,
      role: 'doctor'
    });

    chat.onMessages(renderMessages);
  });
</script>
</body>
</html>
