<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vitalora — Cari Dokter</title>
  <link rel="stylesheet" href="../shared/neumorphic.css">
  <script type='module' src='https://unpkg.com/ionicons@5.0.0/dist/ionicons/ionicons.esm.js'></script>
  <script nomodule src='https://unpkg.com/ionicons@5.0.0/dist/ionicons/ionicons.js'></script>
  <style>
    /* Hero Search */
    .search-hero { background: linear-gradient(135deg, #0D2B1A 0%, #1A5C38 100%); padding: 20px; color: #fff; }
    .search-bar { display: flex; gap: 8px; margin-top: 12px; }
    .search-bar input { flex: 1; padding: 12px 16px; border: none; border-radius: 12px; background: rgba(255,255,255,0.95); color: var(--text-primary); font-family: var(--font); }
    .search-bar ion-icon { font-size: 1.2rem; }

    /* Filter chips */
    .filter-chips { display: flex; gap: 8px; overflow-x: auto; padding: 12px 20px; background: var(--bg); -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .filter-chips::-webkit-scrollbar { display: none; }
    .filter-chip { padding: 8px 14px; border-radius: 20px; border: 1px solid var(--shadow-dark); background: #fff; font-size: 0.8rem; cursor: pointer; transition: all 0.2s; white-space: nowrap; flex-shrink: 0; }
    .filter-chip.active { background: var(--primary-dark); color: #fff; border-color: var(--primary-dark); }

    /* Doctor card */
    .doctor-card { display: flex; gap: 14px; padding: 16px; background: var(--bg); box-shadow: var(--shadow-out-sm); border-radius: 16px; cursor: pointer; transition: all 0.2s; margin-bottom: 12px; }
    .doctor-card:active { transform: scale(0.98); }
    .doctor-avatar { width: 56px; height: 56px; border-radius: 12px; background: linear-gradient(135deg, #6FCF97, #27AE60); display: flex; align-items: center; justify-content: center; font-size: 1.8rem; flex-shrink: 0; }
    .doctor-info { flex: 1; }
    .doctor-name { font-weight: 700; color: var(--text-primary); font-size: 0.95rem; }
    .doctor-spec { font-size: 0.8rem; color: var(--text-secondary); margin-top: 2px; }
    .doctor-meta { display: flex; gap: 12px; margin-top: 6px; font-size: 0.75rem; color: var(--text-tertiary); }
    .doctor-rating { display: flex; align-items: center; gap: 4px; }
    .star { color: #F2994A; }
    .doctor-action { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; flex-shrink: 0; }
    .price-badge { font-weight: 700; color: var(--primary-dark); font-size: 0.9rem; }
    .price-unit { font-size: 0.65rem; color: var(--text-tertiary); }

    /* Empty state */
    .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); }
    .empty-state ion-icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.5; }

    /* Loading */
    .loading { text-align: center; padding: 20px; color: var(--text-tertiary); }

    /* Section */
    .section { padding: 0 20px 20px; }
    .section-title { font-weight: 700; color: var(--text-primary); font-size: 0.95rem; margin-bottom: 12px; }
  </style>
</head>
<body>
<div class="mobile-frame page-enter">

  <!-- Header with Search -->
  <div class="search-hero">
    <button class="neu-icon-btn" style="background:rgba(255,255,255,0.12);color:#fff;border:1px solid rgba(255,255,255,0.1);" onclick="nav('consultation.html')">
      <ion-icon name="arrow-back-outline"></ion-icon>
    </button>
    <div style="font-size:1.1rem;font-weight:700;margin-bottom:12px;">Cari Dokter</div>
    <div class="search-bar">
      <ion-icon name="search-outline" style="color:var(--text-tertiary);"></ion-icon>
      <input type="text" id="searchInput" placeholder="Nama dokter atau spesialisasi..." oninput="filterDoctors()">
    </div>
  </div>

  <!-- Filter chips -->
  <div class="filter-chips">
    <div class="filter-chip active" data-filter="all" onclick="setFilter('all'); filterDoctors();">Semua</div>
    <div class="filter-chip" data-filter="cardio" onclick="setFilter('cardio'); filterDoctors();">Kardiolog</div>
    <div class="filter-chip" data-filter="endo" onclick="setFilter('endo'); filterDoctors();">Endokrinolog</div>
    <div class="filter-chip" data-filter="neuro" onclick="setFilter('neuro'); filterDoctors();">Neurolog</div>
    <div class="filter-chip" data-filter="pulmo" onclick="setFilter('pulmo'); filterDoctors();">Pulmonolog</div>
    <div class="filter-chip" data-filter="general" onclick="setFilter('general'); filterDoctors();">Umum</div>
  </div>

  <!-- Doctor list -->
  <div class="section">
    <div id="doctorList" style="margin-top:8px;">
      <div class="loading"><ion-icon name="hourglass-outline" style="font-size:1.5rem;margin-bottom:8px;"></ion-icon>Memuat dokter...</div>
    </div>
  </div>

</div>

<script src="../shared/app.js"></script>
<script src="../shared/firebase.js"></script>
<script>
let currentUserId = null;
let allDoctors = [];
let currentFilter = 'all';

(async () => {
  try {
    const { user } = await VAuth.guard('patient', 1);
    currentUserId = user.uid;
    await loadDoctors();
  } catch (e) {
    console.error('[find-doctor] guard error:', e);
  }
})();

async function loadDoctors() {
  try {
    // Get all users with role 'doctor' dari Firestore
    const doctors = await VDB.getAllUsers('doctor');

    if (!doctors || doctors.length === 0) {
      showEmpty();
      return;
    }

    // Add mock data jika diperlukan
    allDoctors = doctors.length > 0 ? doctors : generateMockDoctors();
    filterDoctors();
  } catch (e) {
    console.error('Load doctors error:', e);
    // Fallback to mock data
    allDoctors = generateMockDoctors();
    filterDoctors();
  }
}

function generateMockDoctors() {
  const specs = {
    cardio: 'Kardiolog',
    endo: 'Endokrinolog',
    neuro: 'Neurolog',
    pulmo: 'Pulmonolog',
    general: 'Dokter Umum'
  };
  const names = [
    { name: 'Dr. Budi Santoso', spec: 'cardio' },
    { name: 'Dr. Siti Nurhaliza', spec: 'endo' },
    { name: 'Dr. Ahmad Wijaya', spec: 'general' },
    { name: 'Dr. Eka Putri', spec: 'neuro' },
    { name: 'Dr. Rudi Hartono', spec: 'pulmo' },
    { name: 'Dr. Lisa Kusuma', spec: 'endo' },
    { name: 'Dr. Bambang Setiawan', spec: 'cardio' },
    { name: 'Dr. Citra Dewi', spec: 'general' },
  ];

  return names.map((item, idx) => ({
    uid: 'doctor-' + idx,
    name: item.name,
    email: item.name.toLowerCase().replace(/\s+/g, '.') + '@vitalora.id',
    role: 'doctor',
    specialty: specs[item.spec] || 'Dokter Umum',
    specialtyCode: item.spec,
    rating: 4.5 + Math.random() * 0.5,
    reviewCount: 15 + Math.floor(Math.random() * 100),
    consultationFee: 100000 + Math.floor(Math.random() * 200000),
    experience: 3 + Math.floor(Math.random() * 20),
    isOnline: Math.random() > 0.3,
  }));
}

function setFilter(filter) {
  currentFilter = filter;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  document.querySelector('[data-filter="' + filter + '"]').classList.add('active');
}

function filterDoctors() {
  const query = document.getElementById('searchInput').value.toLowerCase();

  let filtered = allDoctors.filter(d => {
    const matchSpec = currentFilter === 'all' || d.specialtyCode === currentFilter;
    const matchSearch = query === '' ||
                        d.name.toLowerCase().includes(query) ||
                        (d.specialty && d.specialty.toLowerCase().includes(query));
    return matchSpec && matchSearch;
  });

  if (filtered.length === 0) {
    showEmpty();
    return;
  }

  renderDoctorList(filtered);
}

function renderDoctorList(doctors) {
  const html = doctors.map(doctor => `
    <div class="doctor-card" onclick="nav('doctor-detail.html?id=${doctor.uid}')">
      <div class="doctor-avatar" style="background:linear-gradient(135deg,${getColorForSpec(doctor.specialtyCode)},${getColorForSpecDark(doctor.specialtyCode)});">
        👨‍⚕️
      </div>
      <div class="doctor-info">
        <div class="doctor-name">${doctor.name}</div>
        <div class="doctor-spec">${doctor.specialty || 'Dokter'}</div>
        <div class="doctor-meta">
          <span class="doctor-rating">
            <span class="star">★</span> ${(doctor.rating || 4.5).toFixed(1)} (${doctor.reviewCount || 0} review)
          </span>
          <span>•</span>
          <span>${doctor.experience || 5} tahun</span>
        </div>
      </div>
      <div class="doctor-action">
        <div class="price-badge">Rp${formatPrice(doctor.consultationFee || 150000)}</div>
        <div class="price-unit">/konsultasi</div>
        ${doctor.isOnline ? '<div style="font-size:0.7rem;color:#27AE60;font-weight:700;">● Online</div>' : '<div style="font-size:0.7rem;color:var(--text-tertiary);">● Offline</div>'}
      </div>
    </div>
  `).join('');

  document.getElementById('doctorList').innerHTML = html;
}

function showEmpty() {
  document.getElementById('doctorList').innerHTML = `
    <div class="empty-state">
      <ion-icon name="search-outline"></ion-icon>
      <div style="margin-top:12px;font-size:0.9rem;">Dokter tidak ditemukan</div>
    </div>
  `;
}

function getColorForSpec(spec) {
  const colors = {
    cardio: '#EB5757',
    endo: '#F2994A',
    neuro: '#6C63FF',
    pulmo: '#2F80ED',
    general: '#6FCF97'
  };
  return colors[spec] || '#6FCF97';
}

function getColorForSpecDark(spec) {
  const colors = {
    cardio: '#C92A2A',
    endo: '#D07D2A',
    neuro: '#5A51DE',
    pulmo: '#1B69D4',
    general: '#27AE60'
  };
  return colors[spec] || '#27AE60';
}

function formatPrice(price) {
  if (price >= 1000000) return (price / 1000000).toFixed(0) + 'jt';
  if (price >= 1000) return (price / 1000).toFixed(0) + 'k';
  return price.toString();
}
</script>
</body>
</html>
