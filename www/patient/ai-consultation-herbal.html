<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vitalora — AI Konsultasi Herbal</title>
  <link rel="stylesheet" href="../shared/neumorphic.css">
  <script type='module' src='https://unpkg.com/ionicons@5.0.0/dist/ionicons/ionicons.esm.js'></script>
  <script nomodule src='https://unpkg.com/ionicons@5.0.0/dist/ionicons/ionicons.js'></script>
  <style>
    :root {
      --accent-herbal: #27AE60;
      --accent-citation: #2F80ED;
    }

    .mobile-frame {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      background: #f5f5f5;
    }

    .app-header {
      background: linear-gradient(135deg, #0D6B3C 0%, #27AE60 100%);
      color: #fff;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 4px 12px rgba(13, 43, 26, 0.2);
    }

    .app-header .neu-icon-btn {
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
      border: none;
    }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }

    .chat-bubble {
      padding: 12px 16px;
      border-radius: 12px;
      max-width: 90%;
      font-size: 0.9rem;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .user-bubble {
      background: linear-gradient(135deg, #27AE60 0%, #1E8449 100%);
      color: #fff;
      align-self: flex-end;
      border-radius: 20px 20px 6px 20px;
    }

    .ai-bubble {
      background: #fff;
      color: var(--text-primary);
      align-self: flex-start;
      border: 2px solid var(--accent-herbal);
      border-radius: 20px 20px 20px 6px;
    }

    .ai-bubble strong {
      color: var(--accent-herbal);
    }

    .citation-block {
      background: linear-gradient(135deg, rgba(47, 128, 237, 0.05), rgba(47, 128, 237, 0.02));
      border-left: 4px solid var(--accent-citation);
      border-radius: 8px;
      padding: 12px;
      margin: 12px 0;
      font-size: 0.8rem;
    }

    .citation-title {
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .citation-authors {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .citation-links {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .citation-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 6px 10px;
      background: white;
      border: 1px solid var(--accent-citation);
      border-radius: 6px;
      color: var(--accent-citation);
      text-decoration: none;
      font-size: 0.75rem;
      font-weight: 600;
      transition: all 0.2s;
    }

    .citation-link:hover {
      background: var(--accent-citation);
      color: white;
    }

    .xai-explanation {
      background: rgba(39, 174, 96, 0.08);
      border-left: 4px solid var(--accent-herbal);
      border-radius: 8px;
      padding: 12px;
      margin: 12px 0;
      font-size: 0.8rem;
    }

    .xai-title {
      font-weight: 700;
      color: var(--accent-herbal);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .xai-content {
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .verification-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 700;
      margin-top: 8px;
    }

    .verified {
      background: rgba(46, 125, 50, 0.15);
      color: #2E7D32;
    }

    .partial {
      background: rgba(239, 108, 0, 0.15);
      color: #EF6C00;
    }

    .disclaimer {
      background: rgba(251, 192, 45, 0.1);
      border-left: 4px solid #FBC02D;
      border-radius: 6px;
      padding: 10px;
      margin: 12px 0;
      font-size: 0.75rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .input-area {
      padding: 16px;
      background: white;
      border-top: 1px solid var(--shadow-dark);
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .query-input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid var(--shadow-dark);
      border-radius: 20px;
      font-size: 0.9rem;
      font-family: inherit;
      transition: all 0.2s;
    }

    .query-input:focus {
      outline: none;
      border-color: var(--accent-herbal);
      background: rgba(39, 174, 96, 0.05);
    }

    .send-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-herbal) 0%, #1E8449 100%);
      color: white;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      transition: all 0.2s;
    }

    .send-btn:active {
      transform: scale(0.95);
    }

    .loading {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-secondary);
      font-size: 0.85rem;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-herbal);
      animation: pulse 1.5s infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    .quick-queries {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .quick-btn {
      padding: 8px;
      background: white;
      border: 2px solid var(--shadow-dark);
      border-radius: 8px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text-secondary);
      font-weight: 600;
    }

    .quick-btn:active {
      background: rgba(39, 174, 96, 0.1);
      border-color: var(--accent-herbal);
    }
  </style>
</head>
<body>

<div class="mobile-frame">

  <header class="app-header">
    <button class="neu-icon-btn" onclick="nav('ai-consultation.html')">
      <ion-icon name="arrow-back-outline"></ion-icon>
    </button>
    <div style="font-size:1.05rem;font-weight:700;">🌿 Konsultasi Herbal</div>
    <div style="width:42px"></div>
  </header>

  <!-- Chat Container -->
  <div class="chat-container" id="chatContainer">
    <!-- Messages appear here -->
    <div class="ai-bubble">
      <strong>💚 AI Konsultan Herbal</strong><br>
      Tanya saya tentang manfaat herbal, interaksi dengan obat, dosis yang aman, keamanan, atau formula tradisional. Semua informasi dari database penelitian kami yang terverifikasi.<br>
      <span style="font-size: 0.75rem; color: var(--text-tertiary); margin-top: 8px; display: block;">
        ✓ Semua sumber dapat dilacak | ✓ No hallucination
      </span>
    </div>
  </div>

  <!-- Quick Query Buttons -->
  <div id="quickQueries" class="quick-queries" style="display: grid;">
    <button class="quick-btn" onclick="sendQuery('Apa manfaat kunyit?')">
      💊 Manfaat herbal
    </button>
    <button class="quick-btn" onclick="sendQuery('Aman tidak kunyit dengan warfarin?')">
      ⚠️ Interaksi obat
    </button>
    <button class="quick-btn" onclick="sendQuery('Berapa dosis jahe?')">
      📐 Dosis & cara pakai
    </button>
    <button class="quick-btn" onclick="sendQuery('Aman tidak ginger saat hamil?')">
      👶 Keamanan khusus
    </button>
  </div>

  <!-- Input Area -->
  <div class="input-area">
    <input
      type="text"
      id="queryInput"
      class="query-input"
      placeholder="Tanya tentang herbal..."
      onkeypress="if(event.key==='Enter') sendQuery(this.value)"
    >
    <button class="send-btn" onclick="sendQuery(document.getElementById('queryInput').value)">
      <ion-icon name="send-outline"></ion-icon>
    </button>
  </div>

</div>

<!-- Firebase & Consultant Scripts -->
<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
<script src="../shared/firebase.js"></script>
<script src="../shared/herbal-consultant-firestore.js"></script>
<script src="../shared/app.js"></script>

<script>
let consultant = null;
let isLoading = false;

// Initialize on page load
async function initConsultant() {
  try {
    // Initialize Firebase
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }

    const db = firebase.firestore();
    consultant = new HerbalConsultantFirestore(db);

    const ready = await consultant.initialize();
    if (ready) {
      showToast('✅ Database siap', 'success');
    } else {
      showToast('⚠️ Database belum tersedia (gunakan local fallback)', 'warning');
    }
  } catch (error) {
    console.error('Init error:', error);
    showToast('Terjadi kesalahan inisialisasi', 'error');
  }
}

// Send query
async function sendQuery(query) {
  if (!query.trim() || isLoading || !consultant) return;

  const trimmedQuery = query.trim();
  document.getElementById('queryInput').value = '';

  // Add user message
  addMessage(trimmedQuery, 'user');

  // Show loading
  isLoading = true;
  showLoading();

  try {
    // Get user context (if logged in)
    const userContext = {
      pregnant: false,
      nursing: false,
      bodyweight: null
    };

    // Try to get user data from VDB
    try {
      const user = await VDB.getCurrentUser();
      if (user && user.patient) {
        userContext.pregnant = user.patient.pregnancy_status === 'pregnant';
        userContext.nursing = user.patient.pregnancy_status === 'nursing';
        userContext.bodyweight = user.patient.weight_kg;
      }
    } catch (e) {
      console.log('Could not retrieve user context');
    }

    // Get AI response
    const response = await consultant.respond(trimmedQuery, userContext);

    // Remove loading indicator
    removeLoading();

    // Add AI response with proper formatting
    addAIResponse(response);

  } catch (error) {
    console.error('Query error:', error);
    removeLoading();
    addMessage('❌ Terjadi kesalahan. Silakan coba lagi.', 'error');
    showToast('Error: ' + error.message, 'error');
  }

  isLoading = false;
}

// Add user message
function addMessage(text, sender) {
  const chatContainer = document.getElementById('chatContainer');
  const msgDiv = document.createElement('div');
  msgDiv.className = `chat-bubble ${sender}-bubble`;
  msgDiv.textContent = text;
  chatContainer.appendChild(msgDiv);
  chatContainer.scrollTop = chatContainer.scrollHeight;
}

// Add AI response with citations
function addAIResponse(response) {
  const chatContainer = document.getElementById('chatContainer');

  // Main response
  const msgDiv = document.createElement('div');
  msgDiv.className = 'ai-bubble';
  msgDiv.innerHTML = response.content.replace(/\n/g, '<br>');

  // Add verification badge
  const badge = document.createElement('div');
  badge.className = `verification-badge ${response.verification_status === 'verified' ? 'verified' : 'partial'}`;
  const statusText = {
    'verified': '✓ Verified',
    'partial': '⚠ Partial',
    'unverified': '❌ No Citation'
  };
  badge.textContent = statusText[response.verification_status] || 'Unverified';
  msgDiv.appendChild(badge);

  chatContainer.appendChild(msgDiv);

  // Add citations
  if (response.sources && response.sources.length > 0) {
    const citationsDiv = document.createElement('div');
    citationsDiv.style.marginLeft = '0';
    citationsDiv.style.marginRight = '0';

    response.sources.forEach(citation => {
      const citBlock = document.createElement('div');
      citBlock.className = 'citation-block';

      let html = `<div class="citation-title">${citation.title}</div>`;
      html += `<div class="citation-authors">${citation.authors} (${citation.year})</div>`;
      html += `<div style="font-size: 0.75rem; color: var(--text-tertiary);">${citation.journal}</div>`;

      html += `<div class="citation-links">`;
      if (citation.url_pubmed) {
        html += `<a class="citation-link" href="${citation.url_pubmed}" target="_blank">
          <ion-icon name="open-outline"></ion-icon> PubMed
        </a>`;
      }
      if (citation.url_doi) {
        html += `<a class="citation-link" href="${citation.url_doi}" target="_blank">
          <ion-icon name="open-outline"></ion-icon> DOI
        </a>`;
      }
      html += `</div>`;

      if (citation.citation_count) {
        html += `<div style="font-size: 0.7rem; color: var(--text-tertiary); margin-top: 6px;">
          📊 Citations: ${citation.citation_count}
        </div>`;
      }

      if (citation.accessibility === 'open_access') {
        html += `<span style="font-size: 0.7rem; background: #E8F5E9; color: #2E7D32; padding: 2px 6px; border-radius: 3px; display: inline-block; margin-top: 4px;">✅ Open Access</span>`;
      }

      citBlock.innerHTML = html;
      citationsDiv.appendChild(citBlock);
    });

    chatContainer.appendChild(citationsDiv);
  }

  // Add XAI explanation if available
  if (response.xai_explanation) {
    const xaiDiv = document.createElement('div');
    xaiDiv.className = 'xai-explanation';
    xaiDiv.innerHTML = `
      <div class="xai-title">
        <ion-icon name="bulb-outline"></ion-icon> XAI - Penjelasan
      </div>
      <div class="xai-content">
        ${response.xai_explanation.replace(/\n/g, '<br>')}
      </div>
    `;
    chatContainer.appendChild(xaiDiv);
  }

  // Add disclaimers
  if (response.disclaimers && response.disclaimers.length > 0) {
    response.disclaimers.forEach(disclaimer => {
      const discDiv = document.createElement('div');
      discDiv.className = 'disclaimer';
      discDiv.textContent = disclaimer.text;
      chatContainer.appendChild(discDiv);
    });
  }

  chatContainer.scrollTop = chatContainer.scrollHeight;
}

// Loading indicator
function showLoading() {
  const chatContainer = document.getElementById('chatContainer');
  const loadingDiv = document.createElement('div');
  loadingDiv.id = 'loadingIndicator';
  loadingDiv.className = 'loading';
  loadingDiv.innerHTML = `<span>Memproses</span><div class="dot"></div><div class="dot"></div><div class="dot"></div>`;
  chatContainer.appendChild(loadingDiv);
  chatContainer.scrollTop = chatContainer.scrollHeight;
}

function removeLoading() {
  const loading = document.getElementById('loadingIndicator');
  if (loading) loading.remove();
}

// Initialize when page loads
document.addEventListener('DOMContentLoaded', initConsultant);
</script>

</body>
</html>
