<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vitalora — AI Health Assistant</title>
  <link rel="stylesheet" href="../shared/neumorphic.css">
  <script type='module' src='https://unpkg.com/ionicons@5.0.0/dist/ionicons/ionicons.esm.js'></script>
  <script nomodule src='https://unpkg.com/ionicons@5.0.0/dist/ionicons/ionicons.js'></script>
  <style>
    .app-header { background: linear-gradient(135deg, #1E1350 0%, #4A43CC 100%); box-shadow: 0 2px 20px rgba(74,67,204,0.4); }
    .app-header .neu-icon-btn { background: rgba(255,255,255,0.12); box-shadow: none; color: #fff; border: 1px solid rgba(255,255,255,0.15); }
    .app-header > div[style*="font-weight:700"] { color: #fff; }

    .ai-badge {
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      font-size: 0.6rem;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 20px;
      letter-spacing: 0.5px;
    }

    .intro-card {
      background: linear-gradient(135deg, rgba(74,67,204,0.08), rgba(108,99,255,0.05));
      border: 1px solid rgba(108,99,255,0.2);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .ai-avatar-sm {
      width: 36px; height: 36px; border-radius: 12px;
      background: linear-gradient(135deg, #4A43CC, #6C63FF);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; box-shadow: 0 3px 10px rgba(108,99,255,0.4);
    }
    .intro-text { font-size: 0.78rem; color: var(--text-secondary); line-height: 1.6; }

    .vitals-mini {
      display: flex; gap: 8px; margin-bottom: 16px;
    }
    .vital-mini-card {
      flex: 1; background: var(--bg); border-radius: 12px;
      box-shadow: var(--shadow-out-sm); padding: 10px 8px; text-align: center;
    }
    .vital-mini-val { font-size: 0.9rem; font-weight: 700; color: var(--text-primary); }
    .vital-mini-label { font-size: 0.58rem; color: var(--text-muted); margin-top: 2px; }
    .vital-mini-icon { font-size: 0.85rem; margin-bottom: 3px; }

    .chat-area {
      display: flex; flex-direction: column; gap: 12px;
      margin-bottom: 16px;
    }

    .chat-bubble-ai {
      display: flex; gap: 8px; align-items: flex-start;
    }
    .bubble-ai {
      background: var(--bg);
      box-shadow: var(--shadow-out-sm);
      border-radius: 0 14px 14px 14px;
      padding: 11px 14px;
      font-size: 0.8rem;
      color: var(--text-secondary);
      line-height: 1.6;
      max-width: 82%;
    }
    .bubble-user {
      background: linear-gradient(135deg, #4A43CC, #6C63FF);
      border-radius: 14px 14px 0 14px;
      padding: 11px 14px;
      font-size: 0.8rem;
      color: #fff;
      line-height: 1.6;
      max-width: 82%;
      align-self: flex-end;
      box-shadow: 0 3px 12px rgba(108,99,255,0.3);
    }
    .chat-timestamp {
      font-size: 0.58rem;
      color: var(--text-muted);
      align-self: flex-end;
    }

    .ai-assessment-card {
      border: 2px solid rgba(108,99,255,0.3);
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(74,67,204,0.05), rgba(108,99,255,0.03));
      padding: 16px;
    }
    .assessment-title { font-size: 0.82rem; font-weight: 700; color: var(--accent); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
    .assessment-row { margin-bottom: 8px; }
    .assessment-diagnosis { font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 4px; }
    .confidence-bar-track { height: 6px; background: var(--bg); box-shadow: var(--shadow-in); border-radius: 3px; overflow: hidden; margin-top: 4px; }
    .confidence-bar-fill { height: 100%; border-radius: 3px; }
    .assessment-rec { font-size: 0.75rem; color: var(--text-tertiary); line-height: 1.6; margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(108,99,255,0.15); }

    .chat-input-bar {
      position: sticky; bottom: 0; left: 0; right: 0;
      background: var(--bg);
      padding: 10px 16px 14px;
      border-top: 1px solid rgba(200,208,231,0.4);
      display: flex; gap: 8px; align-items: center;
    }
    .chat-input-wrap {
      flex: 1;
      background: var(--bg);
      box-shadow: var(--shadow-in);
      border-radius: 24px;
      display: flex; align-items: center;
      padding: 6px 14px; gap: 6px;
    }
    .chat-input-wrap input {
      flex: 1; border: none; background: transparent;
      font-family: 'Poppins', sans-serif; font-size: 0.82rem;
      color: var(--text-primary);
    }
    .chat-input-wrap input:focus { outline: none; }
    .chat-input-wrap input::placeholder { color: var(--text-muted); }
    .send-btn {
      width: 38px; height: 38px; border-radius: 50%;
      background: linear-gradient(135deg, #4A43CC, #6C63FF);
      border: none; display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      box-shadow: 0 3px 10px rgba(108,99,255,0.4);
    }
    .send-btn ion-icon { color: #fff; font-size: 1rem; }
    .send-btn:active { transform: scale(0.94); }

    .section-scroll { padding-bottom: 70px; }
  </style>
</head>
<body>
<div class="mobile-frame page-enter">

  <header class="app-header">
    <button class="neu-icon-btn" onclick="nav('consultation.html')">
      <ion-icon name="arrow-back-outline"></ion-icon>
    </button>
    <div style="display:flex;align-items:center;gap:8px;">
      <div style="font-size:1.05rem;font-weight:700;">AI Health Assistant</div>
      <span class="ai-badge">AI</span>
    </div>
    <button class="neu-icon-btn" onclick="showToast('Riwayat chat AI', 'info')">
      <ion-icon name="time-outline"></ion-icon>
    </button>
  </header>

  <div class="section section-scroll">

    <!-- Intro Card -->
    <div class="intro-card" data-animate="up" id="introCard">
      <div class="ai-avatar-sm">
        <ion-icon name="hardware-chip-outline" style="color:#fff;font-size:1rem;"></ion-icon>
      </div>
      <div class="intro-text">
        Saya adalah asisten kesehatan AI Vitalora. Saya akan membantu Anda menganalisis gejala berdasarkan <strong>data sensor real-time</strong> Anda.
      </div>
    </div>

    <!-- Mode Selector (Initial) -->
    <div id="modeSelector" data-animate="up" data-delay="60" style="display:none;margin-bottom:16px;">
      <div style="font-size:0.7rem;color:var(--text-muted);margin-bottom:8px;font-weight:500;">Pilih mode konsultasi:</div>
      <button class="neu-btn neu-btn-primary neu-btn-block" onclick="startQuickCheck()" style="margin-bottom:8px;">
        <ion-icon name="flash-outline"></ion-icon> Quick Symptom Check (2-3 menit)
      </button>
      <button class="neu-btn neu-btn-accent neu-btn-block" onclick="startDetailedAssessment()" style="background:linear-gradient(135deg,#1E1350,#4A43CC);color:#fff;">
        <ion-icon name="clipboard-outline"></ion-icon> Detailed Assessment (5-7 menit)
      </button>
    </div>

    <!-- Current Vitals Mini -->
    <div style="font-size:0.7rem;color:var(--text-muted);margin-bottom:8px;font-weight:500;" data-animate="up" data-delay="80" id="vitalsLabel">
      <ion-icon name="pulse-outline" style="vertical-align:-2px;color:var(--accent);"></ion-icon> Data sensor Anda
    </div>
    <div class="vitals-mini" data-animate="up" data-delay="100" id="vitalsMini">
      <div class="vital-mini-card">
        <div class="vital-mini-icon" style="color:var(--danger);">❤️</div>
        <div class="vital-mini-val" id="hrVal">--</div>
        <div class="vital-mini-label">HR bpm</div>
      </div>
      <div class="vital-mini-card">
        <div class="vital-mini-icon" style="color:var(--info);">💧</div>
        <div class="vital-mini-val" id="spo2Val">--</div>
        <div class="vital-mini-label">SpO2</div>
      </div>
      <div class="vital-mini-card">
        <div class="vital-mini-icon" style="color:var(--warning);">🌡️</div>
        <div class="vital-mini-val" id="tempVal">--</div>
        <div class="vital-mini-label">Suhu C</div>
      </div>
    </div>

    <!-- Chat Area -->
    <div class="chat-area" id="chatArea" data-animate="up" data-delay="120"></div>

    <!-- Loading Indicator -->
    <div id="loadingIndicator" style="display:none;margin-top:12px;padding:12px;background:rgba(108,99,255,0.1);border-radius:12px;border:1px solid rgba(108,99,255,0.2);text-align:center;">
      <ion-icon name="hourglass-outline" style="color:var(--accent);animation:spin 2s linear infinite;"></ion-icon>
      <div style="font-size:0.75rem;color:var(--text-secondary);margin-top:4px;">Analisis AI sedang berjalan...</div>
    </div>

    <!-- Refer Button -->
    <button class="neu-btn neu-btn-accent neu-btn-block" id="referBtn" data-animate="up" data-delay="200" onclick="nav('consultation.html')" style="background:linear-gradient(135deg,#1E1350,#4A43CC);display:none;">
      <ion-icon name="person-outline"></ion-icon> Rujuk ke Dokter Manusia
    </button>

  </div>

  <!-- Chat Input -->
  <div class="chat-input-bar">
    <button class="neu-icon-btn" style="box-shadow:var(--shadow-out-sm);" onclick="showToast('Pilih gejala dari daftar', 'info')">
      <ion-icon name="list-outline" style="color:var(--accent);"></ion-icon>
    </button>
    <div class="chat-input-wrap">
      <ion-icon name="mic-outline" style="color:var(--text-muted);font-size:1.1rem;cursor:pointer;" onclick="showToast('Fitur suara aktif', 'info')"></ion-icon>
      <input type="text" id="chatInput" placeholder="Ketik gejala atau pertanyaan..." onkeydown="if(event.key==='Enter')sendChat()">
    </div>
    <button class="send-btn" onclick="sendChat()">
      <ion-icon name="send"></ion-icon>
    </button>
  </div>

</div>

<style>
@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="../shared/firebase.js"></script>
<script src="../shared/app.js"></script>
<script src="../shared/gemini-key-manager.js"></script>
<script src="../shared/risk-engine.js"></script>
<script>
let currentUser, currentProfile, geminiKeyManager;
let conversationHistory = [];
let currentMode = null;
let vitalsData = { hr: 0, spo2: 0, temp: 0 };
let healthProfile = null;
let riskScores = null;

(async () => {
  const auth = await VAuth.guard('patient', 1);
  currentUser = auth.user;
  currentProfile = auth.profile;

  // Load Gemini key manager
  geminiKeyManager = new GeminiKeyManager();
  await geminiKeyManager.loadKeys();

  // Load patient vitals from VitalsManager or Firestore
  loadPatientVitals();

  // Load health profile for risk context (cached via VCache)
  try {
    healthProfile = await VDB.getHealthProfile(currentUser.uid);
    if (healthProfile) {
      riskScores = RiskEngine.calculateAll(healthProfile);
    }
  } catch (e) {
    console.warn('Could not load health profile for risk context:', e);
  }

  // Show mode selector
  document.getElementById('modeSelector').style.display = 'block';
  document.getElementById('introCard').style.display = 'block';

  // Initialize with greeting message
  setTimeout(() => {
    addAIMessage(`Halo ${currentProfile.name}! 👋 Saya siap membantu Anda menganalisis kesehatan berdasarkan data sensor real-time Anda.`);
  }, 500);
})();

async function loadPatientVitals() {
  try {
    // Try to get latest vitals from VitalsManager if available
    if (window.VitalsManager) {
      const latest = VitalsManager.getLatest();
      if (latest) {
        vitalsData = { hr: latest.hr || 0, spo2: latest.spo2 || 0, temp: latest.temp || 0 };
      }
    }

    // Get from Firestore as fallback
    const vitalsRef = await firebase.firestore().collection('vitals').doc(currentUser.uid).get();
    if (vitalsRef.exists) {
      const data = vitalsRef.data();
      vitalsData.hr = data.hr || 88;
      vitalsData.spo2 = data.spo2 || 97;
      vitalsData.temp = data.temp || 36.8;
    } else {
      vitalsData = { hr: 88, spo2: 97, temp: 36.8 };
    }

    // Update UI
    document.getElementById('hrVal').textContent = vitalsData.hr.toFixed(0);
    document.getElementById('spo2Val').textContent = vitalsData.spo2.toFixed(0) + '%';
    document.getElementById('tempVal').textContent = vitalsData.temp.toFixed(1) + '°';
  } catch (e) {
    console.error('Error loading vitals:', e);
    vitalsData = { hr: 88, spo2: 97, temp: 36.8 };
  }
}

function addUserMessage(msg) {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.style.cssText = 'display:flex;flex-direction:column;align-items:flex-end;';
  div.innerHTML = `<div class="bubble-user">${msg}</div><div class="chat-timestamp">${new Date().toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'})}</div>`;
  area.appendChild(div);
  area.lastElementChild.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function addAIMessage(msg) {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'chat-bubble-ai';
  div.innerHTML = `<div class="ai-avatar-sm" style="width:28px;height:28px;border-radius:8px;min-width:28px;"><ion-icon name="hardware-chip-outline" style="color:#fff;font-size:0.75rem;"></ion-icon></div>
    <div><div class="bubble-ai">${msg}</div><div class="chat-timestamp" style="margin-left:4px;">${new Date().toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'})}</div></div>`;
  area.appendChild(div);
  area.lastElementChild.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

async function callGeminiAPI(prompt) {
  const apiKey = geminiKeyManager.getNextKey();
  if (!apiKey) {
    showToast('Semua API key sedang digunakan. Tunggu reset harian.', 'error');
    return null;
  }

  try {
    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey.key}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { temperature: 0.7, topK: 40, topP: 0.95, maxOutputTokens: 500 }
      })
    });

    if (!response.ok) {
      throw new Error(`API Error: ${response.status}`);
    }

    const result = await response.json();
    geminiKeyManager.recordUsage(apiKey.id);

    if (result.candidates && result.candidates[0] && result.candidates[0].content && result.candidates[0].content.parts[0]) {
      return result.candidates[0].content.parts[0].text;
    }
    return null;
  } catch (e) {
    console.error('Gemini API Error:', e);
    showToast('Gagal menghubungi AI. Silakan coba lagi.', 'error');
    return null;
  }
}

async function startQuickCheck() {
  currentMode = 'quick';
  document.getElementById('modeSelector').style.display = 'none';
  document.getElementById('introCard').style.display = 'none';
  conversationHistory = [];

  addAIMessage('Mari kita lakukan pemeriksaan cepat. Berapa gejala utama Anda hari ini?');
}

async function startDetailedAssessment() {
  currentMode = 'detailed';
  document.getElementById('modeSelector').style.display = 'none';
  document.getElementById('introCard').style.display = 'none';
  conversationHistory = [];

  addAIMessage(`Kami akan melakukan penilaian kesehatan yang lebih menyeluruh. Saya telah melihat data sensor Anda:\n\n❤️ HR: ${vitalsData.hr} bpm\n💧 SpO2: ${vitalsData.spo2}%\n🌡️ Suhu: ${vitalsData.temp}°C\n\nBerdasarkan data ini, apakah ada yang terasa tidak normal?`);
}

async function sendChat() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg) return;

  addUserMessage(msg);
  conversationHistory.push({ role: 'user', content: msg });
  input.value = '';

  // Show loading
  document.getElementById('loadingIndicator').style.display = 'block';
  document.getElementById('chatInput').disabled = true;
  document.querySelector('.send-btn').disabled = true;

  // Build risk summary if available
  let riskSummary = '';
  if (riskScores && healthProfile) {
    const diseaseMap = {
      metabolic: 'Sindrom Metabolik',
      diabetes: 'Diabetes Mellitus',
      heart: 'Penyakit Jantung',
      hypertension: 'Hipertensi',
      stroke: 'Stroke',
      sleep: 'Gangguan Tidur'
    };

    const topRisks = Object.entries(riskScores)
      .filter(([k, v]) => k !== 'calculatedAt' && k !== 'calculatedWith' && v && v.score !== undefined)
      .sort((a, b) => (b[1]?.score || 0) - (a[1]?.score || 0))
      .slice(0, 3)
      .map(([k, v]) => {
        const topFactors = v.factors ? v.factors.slice(0, 2).join(', ') : 'Data tidak lengkap';
        return `${diseaseMap[k] || k}: ${v.score}/100 (Faktor: ${topFactors})`;
      })
      .join('\n');

    if (topRisks) {
      riskSummary = `\nProfil Risiko Kesehatan Pasien (Top 3):
${topRisks}

Catatan: Jelaskan skor risiko dengan bahasa sederhana jika pasien bertanya. Hubungkan gejala yang dilaporkan dengan faktor risiko yang teridentifikasi.`;
    }
  }

  // Build context
  const context = `Anda adalah asisten kesehatan AI profesional untuk platform telemedisin Vitalora. Anda berbicara dalam bahasa Indonesia.

Data Pasien:
- Nama: ${currentProfile.name}
- Vital Signs Terkini: HR ${vitalsData.hr} bpm, SpO2 ${vitalsData.spo2}%, Suhu ${vitalsData.temp}°C
- Mode Konsultasi: ${currentMode === 'quick' ? 'Quick Symptom Check (2-3 pertanyaan)' : 'Detailed Assessment (5-7 pertanyaan)'}${riskSummary}

Instruksi:
${currentMode === 'quick' ? `1. Tanya maksimal 2-3 gejala lainnya secara singkat
2. Setelah cukup info, berikan assessment ringkas dengan diagnosis awal
3. Saran: "Ini sebaiknya dikonsultasikan dengan dokter untuk diagnosis pasti"` : `1. Tanya detail tentang gejala, durasi, faktor pemicu, riwayat medis
2. Hubungkan dengan vital signs yang abnormal jika ada
3. Setelah percakapan cukup, buat assessment komprehensif dengan differential diagnosis
4. Berikan rekomendasi tindakan`}

Riwayat Percakapan:`;

  // Add conversation history
  conversationHistory.forEach((msg, idx) => {
    context += `\n${idx + 1}. ${msg.role === 'user' ? 'Pasien' : 'AI'}: ${msg.content}`;
  });

  const aiResponse = await callGeminiAPI(context + `\n\nBalas pesan pasien dengan natural dan supportif. Jangan terlalu formal.`);

  document.getElementById('loadingIndicator').style.display = 'none';
  document.getElementById('chatInput').disabled = false;
  document.querySelector('.send-btn').disabled = false;

  if (aiResponse) {
    addAIMessage(aiResponse);
    conversationHistory.push({ role: 'assistant', content: aiResponse });

    // Check if assessment should be generated
    if (conversationHistory.length >= (currentMode === 'quick' ? 6 : 10)) {
      setTimeout(() => generateAssessment(), 1500);
    }
  }

  document.getElementById('chatInput').focus();
}

async function generateAssessment() {
  document.getElementById('loadingIndicator').style.display = 'block';
  document.getElementById('chatInput').style.display = 'none';
  document.querySelector('.send-btn').style.display = 'none';

  const context = `Berdasarkan percakapan berikut, buatkan assessment kesehatan dalam format JSON yang valid:

Percakapan:
${conversationHistory.map(m => `${m.role === 'user' ? 'Pasien' : 'AI'}: ${m.content}`).join('\n')}

Vital Signs: HR ${vitalsData.hr}, SpO2 ${vitalsData.spo2}%, Suhu ${vitalsData.temp}°C

Buatkan response dalam JSON HANYA (tanpa markdown code block):
{
  "diagnosis": "Diagnosis utama berdasarkan gejala",
  "confidence": 75,
  "differential": [
    {"name": "Diagnosis alternatif 1", "probability": 20},
    {"name": "Diagnosis alternatif 2", "probability": 5}
  ],
  "recommendation": "Rekomendasi tindakan lanjutan",
  "urgency": "rendah|sedang|tinggi"
}`;

  const response = await callGeminiAPI(context);

  if (response) {
    try {
      const assessment = JSON.parse(response);
      displayAssessmentCard(assessment);
    } catch (e) {
      console.error('JSON parse error:', e);
      addAIMessage(response);
    }
  }

  document.getElementById('loadingIndicator').style.display = 'none';
  document.getElementById('referBtn').style.display = 'block';
}

function displayAssessmentCard(assessment) {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'chat-bubble-ai';

  const urgencyColor = assessment.urgency === 'tinggi' ? '#EB5757' : assessment.urgency === 'sedang' ? '#F2994A' : '#6FCF97';
  const urgencyBg = assessment.urgency === 'tinggi' ? 'rgba(235,87,87,0.1)' : assessment.urgency === 'sedang' ? 'rgba(242,153,74,0.1)' : 'rgba(111,207,151,0.1)';

  let differentialHTML = '';
  if (assessment.differential && assessment.differential.length > 0) {
    differentialHTML = '<div style="margin-top:8px;border-top:1px solid rgba(108,99,255,0.15);padding-top:8px;"><strong style="font-size:0.78rem;">Diagnosis Alternatif:</strong>';
    assessment.differential.forEach(d => {
      differentialHTML += `<div style="font-size:0.75rem;color:var(--text-tertiary);margin-top:4px;">${d.name} (${d.probability}%)</div>`;
    });
    differentialHTML += '</div>';
  }

  div.innerHTML = `<div class="ai-avatar-sm" style="width:28px;height:28px;border-radius:8px;min-width:28px;flex-shrink:0;"><ion-icon name="hardware-chip-outline" style="color:#fff;font-size:0.75rem;"></ion-icon></div>
    <div style="flex:1;">
      <div class="ai-assessment-card">
        <div class="assessment-title">
          <ion-icon name="analytics-outline"></ion-icon> Analisis AI Anda
        </div>
        <div class="assessment-row">
          <div class="assessment-diagnosis">
            <span style="font-weight:700;color:var(--text-primary);">${assessment.diagnosis}</span>
            <span style="font-size:0.72rem;color:${urgencyColor};font-weight:600;"> ${assessment.confidence}%</span>
          </div>
          <div class="confidence-bar-track">
            <div class="confidence-bar-fill" style="width:${assessment.confidence}%;background:linear-gradient(90deg,${urgencyColor},${urgencyColor}66);"></div>
          </div>
        </div>
        ${differentialHTML}
        <div class="assessment-rec" style="background:${urgencyBg};padding:8px;border-radius:8px;border:none;margin-top:10px;">
          <ion-icon name="information-circle-outline" style="vertical-align:-2px;color:${urgencyColor};"></ion-icon>
          <strong>Rekomendasi:</strong> ${assessment.recommendation}
        </div>
      </div>
      <div class="chat-timestamp" style="margin-top:4px;">${new Date().toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'})}</div>
    </div>`;

  area.appendChild(div);
  area.lastElementChild.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
</script>
</body>
</html>
