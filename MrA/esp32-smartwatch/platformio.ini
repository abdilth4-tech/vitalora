; PlatformIO Project Configuration File
; ESP32-S3 Smartwatch Integration for Vitalora
; Target: Waveshare ESP32-S3 Touch LCD 1.47
;
; Build options: build flags, source filter
; Upload options: custom upload port, speed and extra flags
; Library options: dependencies, extra library storages
; Advanced options: extra scripting
;
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-waveshare]
platform = espressif32@6.9.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
upload_port = COM11

; Build flags untuk ESP32-S3
build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DARDUINO_GFX_USE_DMA=true
    -Isrc/

; Arduino_GFX_Library untuk ST7789 display (v1.3.7 kompatibel dengan Arduino 2.0)
; FT6206 untuk capacitive touch input
; LVGL untuk UI yang presisi dari SVG mockup
lib_deps =
    moononournation/GFX Library for Arduino@1.3.7
    adafruit/Adafruit FT6206 Library@1.0.6
    lvgl/lvgl@8.3.11

; Upload settings
upload_speed = 921600
upload_protocol = esptool

; Partition table untuk lebih banyak SPIFFS space
board_build.partitions = huge_app.csv
